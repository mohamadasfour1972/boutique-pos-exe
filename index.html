<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Permissions-Policy" content="camera=*, microphone=*">
<title>MicroPOS — بوتيك الأناقة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --h1:#4A55C9; --h2:#8890EA;
    --bg:#F4F5FA; --card:#FFFFFF; --border:#E4E6F0;
    --text:#1F2233; --muted:#8A8FA3;
    --green:#3FA349; --green-bg:#E3F3D9; --green-text:#3C7A1E;
    --red:#E5484D; --red-bg:#FCE7E7;
    --pink:#EC407A; --blue-border:#6FA8DC;
    --grey-btn:#E7E9F0; --grey-btn-text:#3A3D4D;
    --yellow:#FFE24D; --blackbar:#161616;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  h1,h2,h3{margin:0;}

  #app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

  /* ---------- TOP BAR (matches MicroPOS gradient header) ---------- */
  #topbar{
    direction:ltr;
    background:linear-gradient(90deg,var(--h1),var(--h2));
    color:#fff;height:58px;flex-shrink:0;display:flex;align-items:center;
    padding:0 8px;gap:10px;
  }
  #topbar .tb-btn{background:transparent;border:none;color:#fff;font-size:22px;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
  #topbar .tb-btn:active{background:rgba(255,255,255,.15);}
  #topbar .tb-title{direction:rtl;flex:1;font-size:18px;font-weight:800;text-align:right;padding-right:2px;}
  #topbar .tb-title small{display:block;font-size:11px;font-weight:400;opacity:.85;}
  #topbar .tb-alert{position:relative;font-size:20px;}
  #topbar .tb-alert .dot{position:absolute;top:-2px;right:-2px;background:var(--red);color:#fff;font-size:9px;font-weight:800;border-radius:50%;width:15px;height:15px;display:flex;align-items:center;justify-content:center;border:2px solid var(--h1);}

  /* ---------- DRAWER ---------- */
  #drawerBg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:60;display:none;}
  #drawer{position:fixed;top:0;right:0;bottom:0;width:270px;background:#fff;z-index:61;transform:translateX(100%);transition:.2s;display:flex;flex-direction:column;box-shadow:-4px 0 20px rgba(0,0,0,.15);}
  #drawer.open{transform:translateX(0);}
  #drawerBg.show{display:block;}
  .drawer-head{background:linear-gradient(135deg,var(--h1),var(--h2));color:#fff;padding:22px 18px;}
  .drawer-head .dh-av{width:46px;height:46px;border-radius:50%;background:#fff;color:var(--h1);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;margin-bottom:8px;}
  .drawer-head .dh-name{font-weight:800;font-size:15px;}
  .drawer-head .dh-role{font-size:11.5px;opacity:.85;}
  .drawer-list{flex:1;overflow:auto;padding:8px 0;}
  .drawer-item{display:flex;align-items:center;gap:12px;padding:12px 18px;font-size:14px;font-weight:600;color:var(--text);border:none;background:none;width:100%;text-align:right;}
  .drawer-item:active{background:var(--bg);}
  .drawer-item .di-ic{font-size:17px;width:20px;text-align:center;}
  .drawer-foot{padding:14px 18px;border-top:1px solid var(--border);}
  .logout-btn{width:100%;padding:10px;border-radius:9px;border:1.5px solid var(--red);background:var(--red-bg);color:var(--red);font-weight:700;font-size:13px;}

  #view{flex:1;overflow:auto;background:var(--bg);}

  /* ---------- HOME GRID ---------- */
  .home-title{padding:16px 18px 4px;font-size:15px;font-weight:700;color:var(--muted);}
  .home-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:10px 16px 24px;}
  .home-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 10px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;box-shadow:0 1px 3px rgba(20,20,50,.04);}
  .home-card:active{background:#F0F1FB;}
  .home-card .hc-ic{width:58px;height:58px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;}
  .home-card .hc-label{font-size:13.5px;font-weight:700;text-align:center;}

  /* ---------- GENERIC LIST-MENU (matches المخزون / العملاء menus) ---------- */
  .menu-head{background:var(--card);padding:20px 18px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
  .menu-head h2{font-size:20px;font-weight:800;}
  .menu-head .mh-ic{width:48px;height:48px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:22px;}
  .menu-list{background:var(--card);}
  .menu-row{display:flex;align-items:center;justify-content:space-between;padding:17px 18px;border-bottom:1px solid var(--border);font-size:14.5px;font-weight:600;background:none;border-left:none;border-right:none;border-top:none;width:100%;text-align:right;color:var(--text);}
  .menu-row:active{background:#F7F8FC;}
  .menu-row .mr-ic{font-size:18px;flex-shrink:0;margin-left:10px;}
  .menu-row.plus .mr-ic{color:var(--green);font-weight:800;}

  /* ---------- CARDS / GENERAL ---------- */
  .panel{background:var(--card);margin:14px 16px;border-radius:14px;border:1px solid var(--border);padding:16px;}
  .btn{border:1px solid var(--border);background:var(--grey-btn);color:var(--grey-btn-text);padding:10px 16px;border-radius:10px;font-size:13.5px;font-weight:700;}
  .btn:active{opacity:.8;}
  .btn-primary{background:var(--h1);border-color:var(--h1);color:#fff;}
  .btn-green{background:var(--green);border-color:var(--green);color:#fff;}
  .btn-danger{background:var(--red-bg);border-color:var(--red);color:var(--red);}
  .btn-sm{padding:6px 12px;font-size:12px;border-radius:8px;}
  .btn-block{width:100%;padding:13px;text-align:center;}
  .btn[disabled]{opacity:.5;}

  label{font-size:12.5px;color:var(--muted);font-weight:700;display:block;margin-bottom:6px;}
  .field{margin-bottom:14px;}
  input[type=text],input[type=number],input[type=tel],input[type=search],input[type=password],select,textarea{
    border:1.5px solid var(--blue-border);border-radius:10px;padding:11px 12px;font-size:14px;background:#fff;color:var(--text);width:100%;
  }
  input[type=number],input[type=tel]{direction:ltr;text-align:right;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--h1);}
  .grey-box{background:#EDEEF4;border:1.5px solid var(--border);border-radius:10px;padding:11px 12px;font-size:14px;font-weight:700;color:var(--text);}
  .row{display:flex;gap:10px;}
  .row>*{flex:1;}

  /* radio pair (اضافة/خصم style) */
  .radio-pair{display:flex;background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;}
  .radio-pair .rp-opt{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;font-weight:800;font-size:14px;border-left:1px solid var(--border);}
  .radio-pair .rp-opt:last-child{border-left:none;}
  .radio-dot{width:19px;height:19px;border-radius:50%;border:2px solid #C7CAD6;display:inline-block;position:relative;flex-shrink:0;}
  .radio-dot.on-green{border-color:var(--green);}
  .radio-dot.on-green:after{content:"";position:absolute;inset:3px;background:var(--green);border-radius:50%;}
  .radio-dot.on-red{border-color:var(--red);}
  .radio-dot.on-red:after{content:"";position:absolute;inset:3px;background:var(--red);border-radius:50%;}
  .rp-opt.green-txt{color:var(--green);}
  .rp-opt.red-txt{color:var(--red);}

  .toggle-row{display:flex;justify-content:space-between;align-items:center;padding:13px 4px;border-bottom:1px solid var(--border);font-size:13.5px;font-weight:600;}
  .toggle-row:last-child{border-bottom:none;}
  .switch{width:42px;height:24px;border-radius:20px;background:#D8DAE4;position:relative;flex-shrink:0;transition:.15s;}
  .switch.on{background:var(--green);}
  .switch .knob{position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
  .switch.on .knob{right:20px;}

  .balance-bar{position:sticky;bottom:0;background:#ECEDF3;border-top:1px solid var(--border);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin:14px -0 0;}
  .balance-bar .bb-val{background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:18px;font-weight:800;color:var(--red);}
  .balance-bar .bb-label{font-weight:800;font-size:15px;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:right;font-size:11px;color:var(--muted);padding:9px 10px;border-bottom:1px solid var(--border);}
  td{padding:10px;border-bottom:1px solid var(--border);}
  tr:last-child td{border-bottom:none;}

  .pill{display:inline-block;border-radius:20px;padding:6px 12px;font-weight:800;font-size:13px;background:var(--green-bg);color:var(--green-text);text-align:center;min-width:52px;}
  .pill.low{background:var(--red-bg);color:var(--red);}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
  .badge-role-admin{background:#EDE8FF;color:#6A3B9E;}
  .badge-role-cashier{background:#DFEBFB;color:#2A628C;}

  .searchbox{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin:14px 16px 8px;}
  .searchbox .sb-ic{font-size:18px;color:var(--muted);}
  .searchbox input{border:none;padding:0;font-size:14px;flex:1;min-width:0;}
  .searchbox input:focus{outline:none;}
  .cam-btn{background:var(--h1);color:#fff;border:none;border-radius:8px;width:32px;height:32px;flex-shrink:0;font-size:15px;display:flex;align-items:center;justify-content:center;}
  .cam-btn:active{opacity:.8;}
  .action-row{display:flex;gap:8px;padding:0 16px 10px;}
  .action-row .btn{flex:1;}

  .stock-row{display:flex;align-items:center;gap:10px;background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;}
  .stock-row .sr-name{flex:1;font-weight:700;font-size:13.5px;}
  .stock-row .sr-sub{font-size:11px;color:var(--muted);font-weight:400;}

  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--muted);text-align:center;gap:10px;}
  .empty-state .em-ic{font-size:34px;}

  .modal-bg{position:fixed;inset:0;background:rgba(20,20,40,.55);display:flex;align-items:center;justify-content:center;z-index:70;padding:16px;}
  .modal{background:var(--card);border-radius:16px;max-width:520px;width:100%;max-height:88vh;overflow:auto;}
  .modal.wide{max-width:680px;}
  .modal-body{padding:20px;}
  .modal-blackbar{background:var(--blackbar);padding:14px 18px;display:flex;justify-content:space-between;align-items:center;border-radius:16px 16px 0 0;}
  .modal-blackbar .mb-title{color:#fff;font-weight:800;font-size:15px;}
  .modal-blackbar .mb-save{background:#3A6FD8;color:#fff;border:none;padding:8px 16px;border-radius:9px;font-weight:800;font-size:13px;display:flex;align-items:center;gap:6px;}
  .barcode-field{display:flex;gap:8px;margin-bottom:14px;}
  .barcode-field input{background:#FBE4EC;color:#C2185B;font-weight:800;text-align:center;letter-spacing:1px;}
  .barcode-field button{background:var(--grey-btn);border:1px solid var(--border);border-radius:10px;padding:0 16px;font-weight:700;font-size:13px;}

  .variant-chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12px;margin:3px;background:#fff;font-weight:600;}
  .variant-chip .vc-del{color:var(--red);font-weight:800;cursor:pointer;}
  .color-dot{width:11px;height:11px;border-radius:50%;display:inline-block;border:1px solid rgba(0,0,0,.15);}

  .checkbox-row{display:flex;gap:16px;align-items:center;background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:14px;flex-wrap:wrap;}
  .chk{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;}
  .chk .box{width:20px;height:20px;border-radius:5px;border:2px solid #C7CAD6;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;}
  .chk .box.checked{background:var(--pink);border-color:var(--pink);}

  .yellow-tip{background:var(--yellow);color:#4A3B00;font-size:12px;font-weight:700;padding:9px 14px;display:flex;justify-content:space-between;position:sticky;bottom:0;}

  /* ---------- POS (sales) SCREEN — matches MicroPOS "المبيعات" screen ---------- */
  .pos-wrap{display:flex;flex-direction:column;height:100%;position:relative;}
  .cat-chip{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:#fff;font-size:12.5px;font-weight:700;color:var(--muted);margin:2px;}
  .cat-chip.active{background:var(--h1);border-color:var(--h1);color:#fff;}
  .cats{display:flex;gap:7px;flex-wrap:wrap;padding:10px 16px;}
  .prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:0 16px 16px;overflow:auto;flex:1;align-content:start;}
  .prod-card{position:relative;background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 10px 10px;text-align:center;}
  .prod-card .swatch{width:100%;height:50px;border-radius:8px;margin-bottom:8px;background:linear-gradient(135deg,var(--h2),var(--h1));display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;}
  .prod-card .pname{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:4px;}
  .prod-card .pprice{font-weight:800;font-size:13.5px;color:var(--h1);}
  .prod-card .pstock{position:absolute;top:8px;left:8px;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:800;}
  .pos-toolbar{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#fff;border-bottom:1px solid var(--border);}
  .pt-icon{width:44px;height:44px;border-radius:10px;border:1px solid var(--border);background:#fff;font-size:19px;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;color:var(--text);}
  .pos-menu-dropdown{position:fixed;top:58px;left:0;right:0;margin-right:0;margin-left:auto;width:64%;max-width:320px;background:#fff;border:1px solid var(--border);border-radius:0 0 0 16px;box-shadow:-6px 10px 28px rgba(20,20,50,.18);z-index:55;display:none;max-height:80vh;overflow:auto;}
  .pos-menu-dropdown.show{display:block;}
  .pmd-item{display:block;width:100%;padding:16px 18px;font-size:13.5px;font-weight:700;text-align:center;border:none;border-bottom:1px solid var(--border);background:none;color:var(--text);}
  .pmd-item:last-child{border-bottom:none;}
  .pmd-item:active{background:var(--bg);}
  .pmd-item.active-tier{color:var(--h1);}
  .pt-icon:active{opacity:.8;}
  .pt-pay{background:linear-gradient(135deg,#F6D365,#F79D65);border:none;color:#5A3A00;}
  .pt-cust{background:#FFF1DA;color:#B36B00;}
  .pt-barcode{background:var(--text);color:#fff;font-size:20px;}
  .qty-badge{position:absolute;top:-6px;left:-6px;background:var(--green);color:#fff;font-size:10px;font-weight:800;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;}
  .pt-search{flex:1;position:relative;min-width:0;}
  .pt-search input{width:100%;border:none;border-bottom:2px solid var(--pink);padding:9px 4px;font-size:14px;background:transparent;}
  .pt-search input:focus{outline:none;}
  .search-suggest{position:absolute;top:100%;right:0;left:0;background:#fff;border:1px solid var(--border);border-radius:0 0 12px 12px;max-height:280px;overflow:auto;z-index:35;box-shadow:0 10px 24px rgba(0,0,0,.12);display:none;}
  .search-suggest.show{display:block;}
  .suggest-row{padding:10px 12px;border-bottom:1px solid var(--border);font-size:12.5px;display:flex;justify-content:space-between;gap:8px;background:none;width:100%;text-align:right;border-left:none;border-right:none;border-top:none;}
  .suggest-row:active{background:var(--bg);}
  .suggest-row .sg-stock{color:var(--muted);font-size:11px;flex-shrink:0;}

  .cart-header-row{display:flex;background:#EDEEF4;padding:9px 14px;font-size:10.5px;font-weight:800;color:var(--muted);}
  .cart-header-row span{flex:1;text-align:center;}
  .cart-header-row span:last-child{text-align:right;flex:2;}
  .cart-list-full{flex:1;overflow:auto;padding-bottom:70px;}
  .cart-row-full{display:flex;align-items:center;gap:6px;padding:10px 14px;border-bottom:1px solid var(--border);background:#fff;}
  .cart-row-full .cr-del{font-size:12.5px;font-weight:800;color:var(--red);background:none;border:none;flex-shrink:0;padding:4px;white-space:nowrap;}
  .cart-row-full .cr-disc{font-size:13px;color:var(--pink);background:none;border:none;flex-shrink:0;padding:4px;font-weight:800;white-space:nowrap;}
  .cart-row-full .cr-box{flex:1;text-align:center;min-width:0;}
  .cart-row-full .cr-box input{width:100%;text-align:center;border:1px solid var(--border);border-radius:8px;padding:7px 2px;font-size:12.5px;font-weight:700;}
  .cart-row-full .cr-text{flex:2;text-align:right;min-width:0;}
  .cart-row-full .cr-name{font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cart-row-full .cr-sub{font-size:10px;color:var(--muted);}

  .fab-grid{position:absolute;left:16px;bottom:118px;width:52px;height:52px;border-radius:50%;background:var(--h1);color:#fff;font-size:22px;border:none;box-shadow:0 6px 18px rgba(74,85,201,.4);z-index:20;}

  .bottom-summary{background:#fff;border-top:1px solid var(--border);padding:10px 14px 12px;}
  .bs-row{display:flex;align-items:center;gap:8px;}
  .bs-qty{background:#fff;border:1.5px solid var(--red);color:var(--red);border-radius:9px;padding:8px 10px;font-weight:800;font-size:14px;min-width:44px;text-align:center;}
  .bs-currency{font-size:11px;color:var(--muted);font-weight:700;flex-shrink:0;}
  .bs-total{flex:1;background:var(--green-bg);color:var(--red);font-weight:800;font-size:21px;text-align:center;border-radius:9px;padding:8px 4px;}
  .bs-label{font-size:11px;font-weight:800;white-space:nowrap;flex-shrink:0;}
  .bs-words{font-size:11px;color:var(--muted);margin-top:7px;text-align:right;line-height:1.6;}
  .cart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;color:var(--muted);font-size:12.5px;gap:8px;}

  .tot-row{display:flex;justify-content:space-between;font-size:12.5px;padding:3px 0;color:var(--muted);}
  .tot-row.grand{border-top:1px dashed var(--border);margin-top:5px;padding-top:8px;font-size:16px;font-weight:800;color:var(--text);}
  .tot-row.grand span:last-child{color:var(--h1);}

  /* ---------- QUERIES / REPORTS PAGE (الاستعلامات) ---------- */
  .q-datebar{background:var(--card);padding:14px 16px;display:flex;align-items:center;justify-content:center;gap:10px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .q-datebar .q-save{width:34px;height:34px;border-radius:8px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--h1);flex-shrink:0;}
  .q-datebar .q-lbl{font-size:13px;font-weight:700;color:var(--text);flex-shrink:0;}
  .q-datebar .q-dinput{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:12.5px;font-weight:700;color:var(--text);text-align:center;}

  .q-catbar{position:sticky;top:0;z-index:5;background:var(--card);border-bottom:1px solid var(--border);display:flex;gap:8px;padding:10px 12px;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;}
  .q-catbar::-webkit-scrollbar{display:none;}
  .q-chip{flex-shrink:0;padding:8px 16px;border-radius:20px;background:var(--bg);border:1px solid var(--border);font-size:12.5px;font-weight:700;color:var(--text);}
  .q-chip.active{background:var(--h1);border-color:var(--h1);color:#fff;}

  .q-section{scroll-margin-top:52px;}
  .q-section-head{background:#EDEEF4;padding:12px 18px;font-size:14.5px;font-weight:800;color:var(--red);border-bottom:1px solid var(--border);}

  .q-row-wrap{background:var(--card);border-bottom:1px solid var(--border);}
  .q-row{display:flex;align-items:center;gap:10px;padding:15px 18px;background:none;border:none;width:100%;text-align:right;color:var(--text);font-size:13.5px;font-weight:600;}
  .q-row:active{background:#F7F8FC;}

const money = n => (Math.round((n+Number.EPSILON)*100)/100).toFixed(2);
function genNumericBarcode(){ let code=''; for(let i=0;i<12;i++) code += Math.floor(Math.random()*10); return code; }
/* يحدد لون HEX تلقائيًا بناءً على اسم اللون المدخل (بدون حاجة لإدخال HEX يدويًا) */
const COLOR_NAME_MAP = { "أبيض":"#F5F3EE","اسود":"#232323","أسود":"#232323","ازرق":"#3A5BA0","أزرق":"#3A5BA0","كحلي":"#1F2A44","بيج":"#D8C6A5","كاكي":"#8C8259","رمادي":"#9A9A9A","مطبوع":"#B85C7A","احمر":"#C0392B","أحمر":"#C0392B","اخضر":"#3FA349","أخضر":"#3FA349","اصفر":"#E4C441","أصفر":"#E4C441","بني":"#7B5B3A","وردي":"#EC407A","برتقالي":"#E07B39" };
function autoColorHex(colorName){
  const key = (colorName||'').trim();
  if(COLOR_NAME_MAP[key]) return COLOR_NAME_MAP[key];
  let hash=0; for(let i=0;i<key.length;i++){ hash = key.charCodeAt(i) + ((hash<<5)-hash); }
  const hue = Math.abs(hash) % 360;
  return `hsl(${hue},45%,45%)`;
}
/* يولّد باركودًا رقميًا لا يتعارض مع أي باركود أساسي أو رمز مقاس/لون مستخدم حاليًا في أي منتج */
function genUniqueBarcode(excludeProductId){
  const used = new Set();
  DB.products.forEach(p=>{
    if(p.id===excludeProductId) return;
    if(p.baseSku) used.add(p.baseSku);
    p.variants.forEach(v=>used.add(v.sku));
  });
  let code;
  do{ code = genNumericBarcode(); } while(used.has(code));
  return code;
}
const fmtDT = d => new Date(d).toLocaleString('ar-SA');

/* ============================= STORAGE — device-first (IndexedDB) ============================= */
/* التخزين الأساسي يتم فعليًا على الجهاز (الهاتف/المتصفح) عبر IndexedDB، بلا اعتماد على الشبكة
   ولا حدود لعدد الطلبات. المزامنة السحابية (window.storage) تبقى نسخة احتياطية اختيارية فقط،
   تُرسل دفعة واحدة مجمّعة كل ثانية تقريبًا حتى لا تصطدم بحد المعدل (rate limit). */
let idbDB = null;
let deviceStorageReady = false;
const memStore = {};

function idbOpen(){
  return new Promise(resolve=>{
    if(!window.indexedDB){ resolve(null); return; }
    try{
      const req = indexedDB.open('boutiquePosDB_v1', 1);
      req.onupgradeneeded = ()=>{ try{ req.result.createObjectStore('kv'); }catch(e){} };
      req.onsuccess = ()=> resolve(req.result);
      req.onerror = ()=> resolve(null);
      req.onblocked = ()=> resolve(null);
    }catch(e){ resolve(null); }
  });
}
function idbGet(key){
  return new Promise(resolve=>{
    if(!idbDB){ resolve(undefined); return; }
    try{
      const tx = idbDB.transaction('kv','readonly');
      const req = tx.objectStore('kv').get(key);
      req.onsuccess = ()=> resolve(req.result);
      req.onerror = ()=> resolve(undefined);
    }catch(e){ resolve(undefined); }
  });
}
function idbSet(key, value){
  return new Promise(resolve=>{
    if(!idbDB){ resolve(false); return; }
    try{
      const tx = idbDB.transaction('kv','readwrite');
      tx.objectStore('kv').put(value, key);
      tx.oncomplete = ()=> resolve(true);
      tx.onerror = ()=> resolve(false);
    }catch(e){ resolve(false); }
  });
}

let cloudSyncTimer = null;
let cloudWarned = false;
function scheduleCloudBackup(){
  if(!window.storage || typeof window.storage.set !== 'function') return;
  if(cloudSyncTimer) clearTimeout(cloudSyncTimer);
  cloudSyncTimer = setTimeout(async ()=>{
    try{ await window.storage.set('posdata_all', JSON.stringify(DB)); }
    catch(e){ if(!cloudWarned){ cloudWarned = true; console.warn('النسخ الاحتياطي السحابي غير متاح حاليًا، البيانات محفوظة على الجهاز بأمان.', e); } }
  }, 1500);
}

async function storageGet(key){
  const v = await idbGet(key);
  if(v !== undefined) return v;
  return memStore[key];
}
async function storageSet(key, value){
  memStore[key] = value;
  const ok = await idbSet(key, value);
  if(ok) deviceStorageReady = true;
  scheduleCloudBackup();
  return true;
}
function showStorageWarningOnce(){
  if(document.getElementById('storageWarnBanner')) return;
  const b = document.createElement('div');
  b.id = 'storageWarnBanner';
  b.style.cssText = 'position:fixed;bottom:10px;left:10px;right:10px;z-index:200;background:#FFF3CD;color:#7A5C00;border:1px solid #E6C464;border-radius:10px;padding:10px 14px;font-size:12.5px;font-weight:700;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.15);';
  b.textContent = 'تنبيه: لا يمكن الحفظ الدائم على هذا الجهاز/المتصفح (قد يكون وضع التصفح الخاص) — البيانات ستُحفظ لهذه الجلسة فقط.';
  document.body.appendChild(b);
  setTimeout(()=>{ if(b.parentNode) b.parentNode.removeChild(b); }, 7000);
}

const KEYS = ['settings','products','customers','sales','users','shifts','suppliers','purchases','expenses','parked','returns','categories','customerPayments','purchaseReturns','damages','supplierPayments','transfers'];
async function loadAll(){
  idbDB = await idbOpen();
  deviceStorageReady = !!idbDB;

  let hadAny=false;
  for(const k of KEYS){
    try{
      const raw = await storageGet(k);
      if(raw !== undefined){ DB[k] = JSON.parse(raw); hadAny = true; }
      else DB[k] = null;
    }catch(e){ DB[k] = null; }
  }
  // أول تشغيل على هذا الجهاز: حاول استرجاع نسخة سحابية سابقة إن وُجدت (مرة واحدة فقط)
  if(!hadAny && window.storage && typeof window.storage.get === 'function'){
    try{
      const cloud = await window.storage.get('posdata_all');
      if(cloud && typeof cloud.value === 'string'){
        const parsed = JSON.parse(cloud.value);
        Object.assign(DB, parsed);
        hadAny = true;
        for(const k of KEYS){ if(DB[k]!==undefined) await idbSet(k, JSON.stringify(DB[k])); }
      }
    }catch(e){ /* لا توجد نسخة سحابية، سيتم البدء ببيانات تجريبية جديدة */ }
  }
  DB.settings = Object.assign(defaultSettings(), DB.settings||{});
  if(!DB.products) DB.products = seedProducts();
  if(!DB.customers) DB.customers = seedCustomers();
  if(!DB.sales) DB.sales = [];
  if(!DB.users) DB.users = seedUsers();
  if(!DB.shifts) DB.shifts = [];
  if(!DB.suppliers) DB.suppliers = seedSuppliers();
  if(!DB.purchases) DB.purchases = [];
  if(!DB.expenses) DB.expenses = [];
  if(!DB.parked) DB.parked = [];
  if(!DB.returns) DB.returns = [];
  if(!DB.categories) DB.categories = [...new Set(DB.products.map(p=>p.category))];
  if(!DB.customerPayments) DB.customerPayments = [];
  if(!DB.purchaseReturns) DB.purchaseReturns = [];
  if(!DB.damages) DB.damages = [];
  if(!DB.supplierPayments) DB.supplierPayments = [];
  if(!DB.transfers) DB.transfers = [];
  if(DB.settings.nextPurchaseInvoice==null) DB.settings.nextPurchaseInvoice = 5001;
  if(!hadAny) await saveAll();
  if(!deviceStorageReady) showStorageWarningOnce();
}
async function saveAll(){ for(const k of KEYS){ await save(k); } }
async function save(key){
  try{ await storageSet(key, JSON.stringify(DB[key])); if(!deviceStorageReady) showStorageWarningOnce(); }
  catch(e){ console.error('save() failed for', key, e); }
}

/* ---------- In-progress sale draft (crash/reload recovery) ----------
   Some Android devices restart the app's WebView when a USB device (like a
   barcode scanner) is physically connected or disconnected, because the OS
   treats it as a hardware/keyboard configuration change. That reload would
   otherwise silently wipe whatever sale was in progress. To protect against
   that, the current cart is continuously mirrored to storage and, if the app
   restarts while a draft exists, the user is offered to restore it. */
let draftPromptShown = false;
async function saveCartDraft(){
  try{
    if(!cart || !cart.length){ await storageSet('cartDraft', ''); return; }
    const draft = { cart, selectedCustomer, paymentMethod, discountPct, discountAmount, discountMode, pointsToRedeem, saleNote, qtyMultiplier, savedAt: Date.now() };
    await storageSet('cartDraft', JSON.stringify(draft));
  }catch(e){ console.error('saveCartDraft failed', e); }
}
async function clearCartDraft(){ try{ await storageSet('cartDraft',''); }catch(e){} }
async function maybeRestoreCartDraft(){
  if(draftPromptShown) return;
  draftPromptShown = true;
  try{
    const raw = await storageGet('cartDraft');
    if(!raw) return;
    const draft = JSON.parse(raw);
    if(!draft || !Array.isArray(draft.cart) || !draft.cart.length) return;
    if(cart && cart.length) return; // don't clobber a sale already in progress in this session
    const ageMin = Math.round((Date.now()-(draft.savedAt||0))/60000);
    if(!confirm(`تم العثور على عملية بيع لم تكتمل (منذ ${ageMin} دقيقة تقريبًا)، غالبًا بسبب إعادة تشغيل مفاجئة للصفحة.\nهل تريد استرجاعها؟`)) { await clearCartDraft(); return; }
    cart = draft.cart; selectedCustomer = draft.selectedCustomer; paymentMethod = draft.paymentMethod||'cash';
    discountPct = draft.discountPct||0; discountAmount = draft.discountAmount||0; discountMode = draft.discountMode||'pct';
    pointsToRedeem = draft.pointsToRedeem||0; saleNote = draft.saleNote||''; qtyMultiplier = draft.qtyMultiplier||1;
    currentView='pos'; render();
  }catch(e){ console.error('maybeRestoreCartDraft failed', e); }
}

/* ============================= GATE (LOGIN + SHIFT) ============================= */
function findOpenShiftFor(userId){ return DB.shifts.find(s=>s.userId===userId && !s.closeTime) || null; }

let appLocked = false;
function showGate(){
  if(!currentUser){ currentUser = DB.users.find(u=>u.role==='admin') || DB.users[0]; }
  currentShift = findOpenShiftFor(currentUser.id);
  if(!currentShift){ renderShiftOpen(); return; }
  if(DB.settings.lockPassword && appLocked){ renderAppLock(); return; }
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='flex';
  currentView='home';
  render();
  notifyLowStockIfPermitted();
  maybeRestoreCartDraft();
}
function renderAppLock(){
  document.getElementById('app').style.display='none';
  const gate = document.getElementById('gate');
  gate.style.display='flex';
  gate.innerHTML = `
  <div class="gate-card">
    <div class="gate-logo">🔒</div>
    <h2>التطبيق مقفل</h2>
    <div class="gsub">أدخل كلمة السر للمتابعة</div>
    <div class="gate-err" id="lockErr" style="display:none;"></div>
    <div class="field"><input type="password" id="lockPassInput" placeholder="كلمة السر"></div>
    <button class="btn btn-primary btn-block" id="lockUnlockBtn">فتح</button>
    ${DB.settings.lockWithFingerprint && window.PublicKeyCredential ? `<button class="btn btn-block" id="lockFingerBtn" style="margin-top:10px;">👆 استخدام بصمة الجهاز</button>` : ''}
  </div>`;
  const tryUnlock = ()=>{
    const val = document.getElementById('lockPassInput').value;
    if(val===DB.settings.lockPassword){ appLocked=false; showGate(); }
    else{ const err=document.getElementById('lockErr'); err.style.display='block'; err.textContent='كلمة سر غير صحيحة'; document.getElementById('lockPassInput').value=''; document.getElementById('lockPassInput').focus(); }
  };
  document.getElementById('lockUnlockBtn').addEventListener('click', tryUnlock);
  document.getElementById('lockPassInput').addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });
  const fb = document.getElementById('lockFingerBtn');
  if(fb) fb.addEventListener('click', async ()=>{
    try{
      await navigator.credentials.get({ publicKey:{ challenge:new Uint8Array(32), userVerification:'required', timeout:30000 } });
      appLocked=false; showGate();
    }catch(e){ const err=document.getElementById('lockErr'); err.style.display='block'; err.textContent='تعذر التحقق بالبصمة، استخدم كلمة السر'; }
  });

function shiftStats(shift, toggles){
  toggles = toggles || {sales:true, purchases:true, expenses:true};
  const start = new Date(shift.openTime);
  const end = shift.closeTime ? new Date(shift.closeTime) : new Date();
  const sales = DB.sales.filter(s=>s.userId===shift.userId && s.status!=='cancelled' && new Date(s.date)>=start && new Date(s.date)<=end);
  const returns = DB.returns.filter(r=>r.userId===shift.userId && new Date(r.date)>=start && new Date(r.date)<=end);
  const cashSales = sales.filter(s=>s.paymentMethod==='cash').reduce((a,s)=>a+s.total,0);
  const cardSales = sales.filter(s=>s.paymentMethod==='card').reduce((a,s)=>a+s.total,0);
  const cashReturns = returns.reduce((a,r)=>a+r.total,0);
  const expenses = DB.expenses.filter(e=>e.userId===shift.userId && new Date(e.date)>=start && new Date(e.date)<=end).reduce((a,e)=>a+e.amount,0);
  const purchases = DB.purchases.filter(pu=>new Date(pu.date)>=start && new Date(pu.date)<=end).reduce((a,pu)=>a+pu.total,0);
  const adjustments = (shift.adjustments||[]);
  const adjAdd = adjustments.filter(a=>a.type==='add').reduce((s,a)=>s+a.amount,0);
  const adjSub = adjustments.filter(a=>a.type==='sub').reduce((s,a)=>s+a.amount,0);
  let expected = shift.openingCash + adjAdd - adjSub;
  if(toggles.sales) expected += (cashSales - cashReturns);
  if(toggles.purchases) expected -= purchases;
  if(toggles.expenses) expected -= expenses;
  return { salesCount:sales.length, cashSales, cardSales, cashReturns, expenses, purchases, expected, totalSales:cashSales+cardSales };
}

function tierPrice(p){

  if(activePriceTier===3 && p.price3) return p.price3;
  return p.price;

function allVariantsFlat(){ const list=[]; DB.products.forEach(p=>p.variants.forEach(v=>list.push({p,v}))); return list; }
function totalStock(p){ return p.variants.reduce((s,v)=>s+v.stock,0); }
function findVariantBySku(sku){ return allVariantsFlat().find(x=>x.v.sku.toLowerCase()===sku.toLowerCase()); }
function findProductByBaseSku(sku){ if(!sku) return null; const q=String(sku).trim().toLowerCase(); if(!q) return null; return DB.products.find(p=>(p.baseSku||'').toLowerCase()===q); }
/* يبحث عن الرمز الممسوح إما كرمز صنف (مقاس/لون) أو كرقم الباركود الأساسي للمنتج نفسه،
   لأن بعض المتاجر تطبع/تستخدم باركود المنتج الأساسي فقط دون رموز فرعية لكل مقاس ولون */
function resolveScanCode(val){
  val = (val||'').toString().trim();
  if(!val) return null;
  const byVariant = findVariantBySku(val);
  if(byVariant) return { product: byVariant.p, variant: byVariant.v, multi:false };
  const byBase = findProductByBaseSku(val);
  if(byBase && byBase.variants.length){
    if(byBase.variants.length===1) return { product: byBase, variant: byBase.variants[0], multi:false };
    return { product: byBase, variant:null, multi:true };
  }
  return null;
}

/* ---------- Arabic amount-in-words ---------- */
const AR_ONES=['','واحد','اثنان','ثلاثة','أربعة','خمسة','ستة','سبعة','ثمانية','تسعة'];
const AR_TEENS=['عشرة','أحد عشر','اثنا عشر','ثلاثة عشر','أربعة عشر','خمسة عشر','ستة عشر','سبعة عشر','ثمانية عشر','تسعة عشر'];
const AR_TENS=['','','عشرون','ثلاثون','أربعون','خمسون','ستون','سبعون','ثمانون','تسعون'];
const AR_HUNDREDS=['','مائة','مئتان','ثلاثمائة','أربعمائة','خمسمائة','ستمائة','سبعمائة','ثمانمائة','تسعمائة'];
function arOnesTens(n){
  if(n===0) return '';
  if(n<10) return AR_ONES[n];
  if(n<20) return AR_TEENS[n-10];
  const t=Math.floor(n/10), o=n%10;
  return o===0 ? AR_TENS[t] : AR_ONES[o]+' و'+AR_TENS[t];
}
function arHundreds(n){
  if(n<100) return arOnesTens(n);
  const h=Math.floor(n/100), r=n%100;
  return r===0 ? AR_HUNDREDS[h] : AR_HUNDREDS[h]+' و'+arOnesTens(r);
}
function arNumber(n){
  n = Math.floor(n);
  if(n===0) return 'صفر';
  const parts=[];
  if(n>=1000000){ const m=Math.floor(n/1000000); parts.push(m===1?'مليون':arHundreds(m)+' مليون'); n%=1000000; }
  if(n>=1000){ const th=Math.floor(n/1000); parts.push(th===1?'ألف':th===2?'ألفان':arHundreds(th)+' ألف'); n%=1000; }
  if(n>0) parts.push(arHundreds(n));
  return parts.join(' و');
}
function amountInWords(total, currency){
  const intPart = Math.floor(total);
  const frac = Math.round((total-intPart)*100);
  let words = 'فقط ' + arNumber(intPart) + ' ' + (currency||'ريال');
  if(frac>0) words += ' و' + arNumber(frac) + ' ' + (DB.settings.currencySubunit||'هللة');
  words += ' لا غير.';
  return words;
}

function lineDiscountAmount(it){
  const gross = it.price*it.qty;
  if(!it.discount) return 0;
  return it.discountType==='pct' ? gross*(Math.min(100,it.discount)/100) : Math.min(it.discount, gross);
}
function lineNetTotal(it){ return Math.max(0, it.price*it.qty - lineDiscountAmount(it)); }
function cartListHtml(){
  if(cart.length===0) return `<div class="cart-empty"><div style="font-size:26px;">🛍️</div>السلة فارغة<br>ابحث عن صنف أو امسح الباركود لإضافته</div>`;
  const hidePrice = DB.settings.hidePriceInSale;
  const priceReadonly = DB.settings.disablePriceEditInSale;
  return cart.map((it,idx)=>{
    const disc = lineDiscountAmount(it);
    return `
    <div class="cart-row-full">
      <button class="cr-del" data-idx="${idx}" title="حذف">حذف</button>
      <button class="cr-disc" data-idx="${idx}" title="خصم على هذا الصنف">${disc>0?'خصم -'+money(disc):'خصم'}</button>
      <div class="cr-box"><input type="text" value="${hidePrice?'—':money(lineNetTotal(it))}" readonly></div>
      <div class="cr-box"><input type="number" class="cr-qty" data-idx="${idx}" value="${it.qty}" min="1"></div>
      <div class="cr-box"><input type="number" class="cr-priceinput" data-idx="${idx}" value="${it.price}" min="0" step="0.01" ${hidePrice?'style="visibility:hidden;"':''} ${priceReadonly?'readonly':''}></div>
      <div class="cr-text"><div class="cr-name">${it.name}</div><div class="cr-sub">${it.size}/${it.color} · ${it.sku||''}${disc>0?` · <span style="color:var(--pink);">خصم ${money(disc)}</span>`:''}</div></div>
    </div>`;
  }).join('');
}
function computeTotals(){
  const subtotal = cart.reduce((s,i)=>s+i.price*i.qty,0);
  const itemDiscountsTotal = cart.reduce((s,i)=>s+lineDiscountAmount(i),0);
  const afterItemDiscounts = Math.max(0, subtotal - itemDiscountsTotal);
  const invoiceDiscount = discountMode==='amount' ? Math.min(discountAmount||0, afterItemDiscounts) : afterItemDiscounts*((discountPct||0)/100);
  const discount = itemDiscountsTotal + invoiceDiscount;
  const afterDiscount = Math.max(0, afterItemDiscounts - invoiceDiscount);
  const loyaltyDiscount = Math.min(pointsToRedeem * DB.settings.pointValue, afterDiscount);
  const taxable = afterDiscount - loyaltyDiscount;
  const tax = taxable * (DB.settings.taxRate/100);
  const total = taxable + tax;
  return {subtotal,discount,itemDiscountsTotal,invoiceDiscount,loyaltyDiscount,tax,total};
}
function addToCartBySku(val, qty){
  qty = qty || 1;
  const resolved = resolveScanCode(val);
  if(!resolved){ alert('لم يتم العثور على صنف بهذا الرمز: '+val); return false; }
  if(resolved.multi){ openVariantPicker(resolved.product); return true; }
  const found = { p: resolved.product, v: resolved.variant };
  const blockOOS = DB.settings.blockSaleWhenOutOfStock;
  if(blockOOS && found.v.stock<=0){ alert('هذا الصنف غير متوفر بالمخزون'); return false; }
  const existing = !DB.settings.allowDuplicateInCart ? cart.find(i=>i.variantId===found.v.id) : null;
  if(existing){ if(blockOOS && existing.qty+qty>found.v.stock){ alert('الكمية تتجاوز المخزون'); return false; } existing.qty+=qty; }
  else{
    if(blockOOS && qty>found.v.stock){ alert('الكمية تتجاوز المخزون'); return false; }
    cart.push({variantId:found.v.id, productId:found.p.id, name:found.p.name, size:found.v.size, color:found.v.color, price:tierPrice(found.p), qty, sku:found.v.sku});
  }
  playBeep();
  softRenderPos();
  return true;
}

/* ---------- Camera barcode scanner ---------- */
function loadQuagga(cb){
  if(window.Quagga){ cb(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js';
  s.onload = cb;
  s.onerror = ()=>{ const st=document.getElementById('camStatus'); if(st) st.textContent='تعذر تحميل أداة المسح (تحقق من الاتصال بالإنترنت)'; };
  document.body.appendChild(s);
}
function openBarcodeScanner(onResult){
  const modal = document.getElementById('modalRoot');
  modal.innerHTML = `<div class="modal-bg" id="camMbg"><div class="modal"><div class="modal-body" style="text-align:center;">
    <h3 style="margin-bottom:10px;">مسح الباركود بالكاميرا</h3>
    <div style="position:relative;background:#000;border-radius:12px;overflow:hidden;">
      <video id="camVideo" autoplay playsinline muted style="width:100%;max-height:300px;object-fit:cover;display:block;"></video>
      <div style="position:absolute;inset:14px;border:3px solid rgba(67,163,73,.6);border-radius:10px;pointer-events:none;"></div>
    </div>
    <div id="camStatus" style="font-size:12.5px;color:var(--muted);margin:10px 0;">جارٍ تشغيل الكاميرا...</div>
    <button class="btn btn-block" id="camClose">إلغاء</button>
  </div></div></div>`;
  let stream=null, quaggaActive=false, rafId=null, done=false, detecting=false;
  const video = document.getElementById('camVideo');
  const statusEl = document.getElementById('camStatus');
  const cleanup = ()=>{
    if(rafId) cancelAnimationFrame(rafId);
    if(stream) stream.getTracks().forEach(t=>t.stop());
    if(quaggaActive && window.Quagga){ try{ Quagga.offDetected(); Quagga.stop(); }catch(e){} }
  };
  const finish = (val)=>{ if(done) return; done=true; cleanup(); closeModal(); onResult(val); };
  document.getElementById('camClose').addEventListener('click',()=>{ cleanup(); closeModal(); });
  document.getElementById('camMbg').addEventListener('click',e=>{ if(e.target.id==='camMbg'){ cleanup(); closeModal(); } });

  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    statusEl.textContent = 'متصفحك أو هذا السياق لا يدعم الوصول للكاميرا. أدخل الرمز يدويًا.';
    return;
  }
  const constraints = { video:{
    facingMode:{ideal:'environment'},
    width:{ideal:1280}, height:{ideal:720},
    advanced:[{focusMode:'continuous'}]
  }};
  navigator.mediaDevices.getUserMedia(constraints).catch(()=>navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})).then(async s=>{
    if(done){ s.getTracks().forEach(t=>t.stop()); return; }
    stream = s; video.srcObject = s; await video.play().catch(()=>{});
    // Try to force continuous autofocus if the camera supports it (speeds up focus lock on close-range barcodes)
    try{
      const track = s.getVideoTracks()[0];
      const caps = track.getCapabilities ? track.getCapabilities() : {};
      if(caps.focusMode && caps.focusMode.includes('continuous')) track.applyConstraints({advanced:[{focusMode:'continuous'}]}).catch(()=>{});
    }catch(e){}
    if('BarcodeDetector' in window){
      let formats = ['code_128','ean_13','ean_8','upc_a','upc_e','code_39','qr_code'];
      try{ const supported = await BarcodeDetector.getSupportedFormats(); formats = supported.filter(f=>formats.includes(f)); }catch(e){}
      const detector = new BarcodeDetector({formats: formats.length?formats:['code_128']});
      statusEl.textContent = 'وجّه الكاميرا نحو الباركود...';
      const scanLoop = async ()=>{
        if(done) return;
        if(!detecting && video.readyState>=2){
          detecting = true;
          try{
            const codes = await detector.detect(video);
            if(codes && codes.length>0){ finish(codes[0].rawValue); return; }
          }catch(e){}
          detecting = false;
        }
        rafId = requestAnimationFrame(scanLoop);
      };
      rafId = requestAnimationFrame(scanLoop);
    } else {
      statusEl.textContent = 'جارٍ تحميل أداة المسح...';
      loadQuagga(()=>{
        if(done) return;
        quaggaActive = true;
        Quagga.init({
          inputStream:{ type:'LiveStream', target: video, constraints:{ facingMode:'environment', width:{ideal:1280}, height:{ideal:720} } },
          locator:{ patchSize:'medium', halfSample:true },
          numOfWorkers: (navigator.hardwareConcurrency||2),
          frequency: 10,
          decoder:{ readers:['code_128_reader','ean_reader','ean_8_reader','upc_reader','code_39_reader'] }
        }, err=>{
          if(err){ statusEl.textContent='تعذر تشغيل أداة المسح'; return; }
          Quagga.start(); statusEl.textContent='وجّه الكاميرا نحو الباركود...';
        });
        Quagga.onDetected(data=>{ finish(data.codeResult.code); });
      });
    }
  }).catch(err=>{
    statusEl.textContent = 'تعذر الوصول للكاميرا (تحقق من الإذن). يمكنك إدخال الرمز يدويًا.';
  });
}

function bindPos(){
  const search = document.getElementById('unifiedSearch');
  const suggest = document.getElementById('searchSuggest');
  const renderSuggest = ()=>{
    const q = search.value.trim();
    unifiedSearchVal = q;
    if(!q){ suggest.classList.remove('show'); suggest.innerHTML=''; return; }
    let matches = DB.products.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()) || (p.baseSku||'').toLowerCase().includes(q.toLowerCase()) || p.variants.some(v=>v.sku.toLowerCase().includes(q.toLowerCase())));
    if(DB.settings.showOnlyInStockProducts) matches = matches.filter(p=>totalStock(p)>0);
    matches = matches.slice(0,8);
    const infoParts = (p)=>{
      const bits = [];
      if(!DB.settings.hidePriceInSale) bits.push(`${money(tierPrice(p))} ${DB.settings.currency}`);
      if(DB.settings.showCostInSaleScreen) bits.push(`تكلفة ${money(p.cost)}`);
      if(DB.settings.showQtyInSearchList) bits.push(`مخزون ${totalStock(p)}`);
      return bits.join(' · ');
    };
    suggest.innerHTML = matches.length ? matches.map(p=>`<button class="suggest-row" data-pid="${p.id}"><span>${p.name}</span><span class="sg-stock">${infoParts(p)}</span></button>`).join('') : `<div class="suggest-row" style="color:var(--muted);">لا نتائج</div>`;
    suggest.classList.add('show');
    suggest.querySelectorAll('[data-pid]').forEach(row=>row.addEventListener('click',()=>{
      const p = DB.products.find(x=>x.id===row.dataset.pid);
      suggest.classList.remove('show'); search.value=''; unifiedSearchVal='';
      if(DB.settings.allowQuickSale && p.variants.length===1){ addToCartBySku(p.variants[0].sku, qtyMultiplier); }
      else openVariantPicker(p);
    }));
  };
  search.addEventListener('input', renderSuggest);
  search.addEventListener('focus', ()=>{ if(search.value.trim()) renderSuggest(); });
  search.addEventListener('blur', ()=>{ setTimeout(()=>suggest.classList.remove('show'), 180); });
  search.addEventListener('keydown', e=>{
    if(e.key!=='Enter') return;
    const val = search.value.trim();
    search.value=''; unifiedSearchVal=''; suggest.classList.remove('show');
    if(!val) return;
    addToCartBySku(val, qtyMultiplier);
  });
  document.getElementById('camBtn').addEventListener('click',()=>{
    if(barcodeReaderMode==='external'){ search.focus(); return; }
    openBarcodeScanner(val=>{ addToCartBySku(val, qtyMultiplier); });
  });
  document.getElementById('qtyModeBtn').addEventListener('click', openQtyModal);
  document.getElementById('custIconBtn').addEventListener('click', openCustomerPickerModal);
  document.getElementById('calcBtn').addEventListener('click', openPaymentModal);
  document.getElementById('fabGrid').addEventListener('click', openProductBrowseModal);
  document.getElementById('cartListFull').addEventListener('click', e=>{
    const delBtn = e.target.closest('.cr-del');
    if(delBtn){ cart.splice(Number(delBtn.dataset.idx),1); softRenderPos(); return; }
    const discBtn = e.target.closest('.cr-disc');
    if(discBtn){ openItemDiscountModal(Number(discBtn.dataset.idx)); }
  });
  document.getElementById('cartListFull').addEventListener('change', e=>{
    const idx = Number(e.target.dataset.idx); if(isNaN(idx)) return;
    if(e.target.classList.contains('cr-qty')){
      const v = Number(e.target.value)||1;
      const p = DB.products.find(x=>x.id===cart[idx].productId);
      const variant = p && p.variants.find(x=>x.id===cart[idx].variantId);
      if(DB.settings.blockSaleWhenOutOfStock && variant && v>variant.stock){ alert('الكمية تتجاوز المخزون المتاح: '+variant.stock); e.target.value=cart[idx].qty; return; }
      cart[idx].qty = Math.max(1,v);
    } else if(e.target.classList.contains('cr-priceinput')){
      const newPrice = Math.max(0, Number(e.target.value)||0);
      const p = DB.products.find(x=>x.id===cart[idx].productId);
      if(DB.settings.preventBelowCostSale && p && newPrice<p.cost){ alert('لا يُسمح بالبيع بسعر أقل من التكلفة ('+money(p.cost)+')'); e.target.value=cart[idx].price; return; }
      cart[idx].price = newPrice;
    }
    softRenderPos();
  });
}

function renderPosMenuDropdown(){
  const dd = document.getElementById('posMenuDropdown');
  if(!dd) return;
  const items = currentView==='purchase' ? purchMenuItems() : posMenuItems();
  dd.innerHTML = items.map(it=>`<button class="pmd-item ${it.active?'active-tier':''}" data-act="${it.act}">${it.label}</button>`).join('');
  dd.querySelectorAll('.pmd-item').forEach(b=>b.addEventListener('click',()=>{ handlePosMenuAction(b.dataset.act); }));
}
function togglePosMenuDropdown(){
  const dd = document.getElementById('posMenuDropdown');
  const willShow = !dd.classList.contains('show');
  dd.classList.toggle('show', willShow);
  if(willShow) renderPosMenuDropdown();
}
function closePosMenuDropdown(){ const dd=document.getElementById('posMenuDropdown'); if(dd) dd.classList.remove('show'); }
function handlePosMenuAction(act){
  closePosMenuDropdown();
  if(act==='reprint'){ if(DB.sales.length===0){ alert('لا توجد فواتير سابقة'); return; } openReprintInvoiceModal(); }
  else if(act==='editInvoice'){ openEditInvoiceModal(); }
  else if(act==='tier1'){ activePriceTier=1; alert('تم تثبيت سعر البيع 1 لعمليات الإضافة القادمة'); }
  else if(act==='tier2'){ activePriceTier=2; alert('تم تثبيت سعر البيع 2 لعمليات الإضافة القادمة'); }
  else if(act==='tier3'){ activePriceTier=3; alert('تم تثبيت سعر البيع 3 لعمليات الإضافة القادمة'); }
  else if(act==='calc'){ openCalculatorModal(); }
  else if(act==='custBalance'){ openCustomerBalanceInquiry(); }
  else if(act==='importQuote'){ openParkedModal(); }
  else if(act==='toggleReader'){ barcodeReaderMode = barcodeReaderMode==='embedded'?'external':'embedded'; alert('وضع قارئ الباركود الآن: '+(barcodeReaderMode==='embedded'?'متضمّن (كاميرا الجهاز)':'خارجي (جهاز مسح متصل بالحقل)')); }
  else if(act==='addProduct'){ currentView='products'; render(); setTimeout(()=>openProductForm(null),50); }
  else if(act==='viewInvoices'){ currentView='sales'; render(); }
  else if(act==='clearCart'){ if(cart.length===0){ alert('السلة فارغة بالفعل'); return; } if(confirm('مسح جميع الأصناف من الفاتورة الحالية؟')){ cart=[]; editingSaleId=null; render(); clearCartDraft(); } }
  else if(act==='purchAddProduct'){
    openProductForm(null, { onSave:(newProduct)=>{
      currentView='purchase'; render();
      if(newProduct.variants.length===1){
        const v = newProduct.variants[0];
        purchaseCart.push({variantId:v.id, productId:newProduct.id, name:newProduct.name, size:v.size, color:v.color, price:newProduct.cost, qty:purchaseQtyMultiplier, sku:v.sku});
        softRenderPurchase();
      } else {
        openVariantPicker(newProduct, 'purchase');
      }
    }});
  }
  else if(act==='purchReprint'){
    if(DB.purchases.length===0){ alert('لا توجد فواتير توريد سابقة'); return; }
    openReprintPurchaseInvoiceModal();
  }
  else if(act==='purchEditInvoice'){ openEditPurchaseInvoiceModal(); }
  else if(act==='purchImportPO'){ openImportPurchaseOrderModal(); }
}
function openImportPurchaseOrderModal(){
  const modal = document.getElementById('modalRoot');
  modal.innerHTML = `<div class="modal-bg" id="mbg"><div class="modal"><div class="modal-body">
    <h3 style="margin-bottom:10px;">استيراد البيانات من طلب شراء</h3>
    <div style="font-size:12.5px;color:var(--muted);margin-bottom:12px;">اختر ملف Excel يحتوي أعمدة: اسم/باركود الصنف، الكمية، والتكلفة (اختياري). سيتم البحث عن كل صنف وإضافته لقائمة التوريد الحالية بالكمية المحددة.</div>
    <input type="file" id="poFileInput" accept=".xlsx,.xls,.csv,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,text/csv,*/*" style="margin-bottom:12px;">
    <div id="poImportStatus" style="font-size:12.5px;color:var(--muted);"></div>
    <button class="btn btn-block" id="poCancel" style="margin-top:12px;">إغلاق</button>
  </div></div></div>`;
  document.getElementById('mbg').addEventListener('click',e=>{if(e.target.id==='mbg')closeModal();});
  document.getElementById('poCancel').addEventListener('click', closeModal);
  document.getElementById('poFileInput').addEventListener('change', e=>{
    const file = e.target.files[0]; if(!file) return;
    const status = document.getElementById('poImportStatus');
    const processRows = (rows)=>{
      let added = 0, notFound = [];
      rows.slice(1).forEach(r=>{
        const nameOrSku = String(r[0]||'').trim();
        const qty = Number(r[1])||0;
        const cost = r[2]!=null && r[2]!=='' ? Number(r[2]) : null;
        if(!nameOrSku || qty<=0) return;
        const found = findVariantBySku(nameOrSku) || (()=>{
          for(const p of DB.products){ const v = p.variants.find(v=>v.sku.toLowerCase()===nameOrSku.toLowerCase()); if(v) return {p,v}; }
          const p = DB.products.find(p=>p.name.trim().toLowerCase()===nameOrSku.toLowerCase());
          return p ? {p, v:p.variants[0]} : null;
        })();
        if(!found){ notFound.push(nameOrSku); return; }
        purchaseCart.push({ variantId:found.v.id, productId:found.p.id, name:found.p.name, size:found.v.size, color:found.v.color, price: cost!=null?cost:found.p.cost, qty, sku:found.v.sku });
        added++;
      });
      status.innerHTML = `تمت إضافة ${added} صنف لقائمة التوريد.` + (notFound.length?`<br><span style="color:var(--red);">لم يتم إيجاد: ${notFound.slice(0,10).join('، ')}${notFound.length>10?'...':''}</span>`:'');
      if(added>0){ closeModal(); currentView='purchase'; render(); }
    };
    if(isCsvFile(file)){
      status.textContent = 'جارٍ القراءة...';
      const reader = new FileReader();
      reader.onload = ev=>{
        try{ processRows(parseCSVText(ev.target.result)); }
        catch(err){ status.innerHTML = `<span style="color:var(--red);">تعذر قراءة ملف CSV. تأكد من التنسيق.</span>`; }
      };
      reader.readAsText(file, 'UTF-8');
      return;
    }
    status.textContent = 'جارٍ التحميل...';
    loadXLSX(()=>{
      const reader = new FileReader();
      reader.onload = ev=>{
        try{
          const wb = XLSX.read(ev.target.result, {type:'binary'});
          const sheet = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(sheet, {header:1});
          processRows(rows);
        }catch(err){ status.innerHTML = `<span style="color:var(--red);">تعذر قراءة الملف. تأكد من التنسيق.</span>`; console.error(err); }
      };
      reader.readAsBinaryString(file);
    }, ()=>{
      status.innerHTML = 'تعذر تحميل أداة قراءة ملفات Excel (الاتصال بالإنترنت غير متاح داخل التطبيق).<br>الحل: احفظ الملف بصيغة <b>CSV</b> من برنامج Excel (File → Save As → CSV) وارفعه بدل ذلك.';
    });
  });
}

      <button data-c="4">4</button><button data-c="5">5</button><button data-c="6">6</button><button data-c="*">×</button>
      <button data-c="1">1</button><button data-c="2">2</button><button data-c="3">3</button><button data-c="-">−</button>
      <button data-c="0">0</button><button data-c=".">.</button><button data-c="C">C</button><button data-c="+">+</button>
    </div>
    <div style="display:flex;gap:10px;margin-top:10px;"><button class="btn" id="calcClose" style="flex:1;">إغلاق</button><button class="btn btn-primary" id="calcEq" style="flex:2;">=</button></div>
  </div></div></div>`;
  let expr = '';
  const disp = document.getElementById('calcDisplay');
  document.querySelectorAll('.numpad button').forEach(b=>b.addEventListener('click',()=>{
    const c = b.dataset.c;
    if(c==='C'){ expr=''; disp.value='0'; return; }
    expr += c; disp.value = expr;
  }));
  document.getElementById('calcEq').addEventListener('click',()=>{
    try{
      const safe = expr.replace(/[^0-9+\-*/.() ]/g,'');
      const result = Function('"use strict";return ('+safe+')')();
      disp.value = String(result); expr = String(result);
    }catch(e){ disp.value='خطأ'; expr=''; }
  });

  document.getElementById('mbg').addEventListener('click',e=>{if(e.target.id==='mbg')closeModal();});
}

  const rebind = ()=>{
    const activeEl = document.activeElement;
    const activeId = activeEl && activeEl.id;
    const activeIsNumField = activeEl && activeEl.dataset && activeEl.dataset.numfield==='1';
    const activeRawVal = activeIsNumField ? activeEl.value : null;
    let selStart = null, selEnd = null;
    try{ if(activeEl && typeof activeEl.selectionStart === 'number'){ selStart = activeEl.selectionStart; selEnd = activeEl.selectionEnd; } }catch(e){}
    document.getElementById('payBody').innerHTML = renderBody();
    document.querySelectorAll('#discModeRow .rp-opt').forEach(b=>b.addEventListener('click',()=>{ discountMode=b.dataset.dmode; rebind(); }));
    const sanitizeNum = (el)=>{
      const before = el.value;
      let v = before.replace(/[^0-9.]/g,'');
      const parts = v.split('.');
      if(parts.length>2) v = parts[0]+'.'+parts.slice(1).join('');
      if(v!==before){
        const pos = Math.max(0,(el.selectionStart||v.length) - (before.length - v.length));
        el.value = v;
        try{ el.setSelectionRange(pos,pos); }catch(err){}
      }
      return v;
    };
    document.getElementById('discountInput').addEventListener('input', e=>{
      const v = sanitizeNum(e.target);
      if(discountMode==='amount'){ discountAmount = Math.max(0,Number(v)||0); }
      else{ discountPct = Math.max(0,Math.min(100,Number(v)||0)); }
      rebind();
    });
    document.getElementById('pointsInput').addEventListener('input', e=>{ const v=sanitizeNum(e.target); pointsToRedeem = Math.max(0,Number(v)||0); rebind(); });
    const sd = document.getElementById('saleDateInput'); if(sd) sd.addEventListener('change', e=>{ overrideSaleDate = new Date(e.target.value); });
    document.querySelectorAll('.pay-methods button').forEach(b=>b.addEventListener('click',()=>{
      if(b.dataset.pm==='credit'){
        const custNow = DB.customers.find(c=>c.id===(selectedCustomer||DB.customers[0].id)) || DB.customers[0];
        if(custNow.walkIn){ alert('لا يمكن تسجيل بيع آجل لعميل نقدي (افتراضي). الرجاء اختيار عميل محدد أولاً.'); openCustomerPickerModal(); return; }
      }
      paymentMethod=b.dataset.pm; rebind();
    }));
    const ri = document.getElementById('receivedInput'); if(ri) ri.addEventListener('input', e=>{ sanitizeNum(e.target); rebind(); });
    const cr = document.getElementById('convRate');
    if(cr) cr.addEventListener('input', ()=>{
      sanitizeNum(cr);
      const t = computeTotals(); const rate = Number(cr.value)||1;
      document.getElementById('convResult').value = money(t.total*rate);
    });
    const sni = document.getElementById('saleNoteInput'); if(sni) sni.addEventListener('input', e=>{ saleNote = e.target.value; });
    document.getElementById('confirmPayBtn').addEventListener('click', async ()=>{
      const t = computeTotals();
      const received = Number(document.getElementById('receivedInput')?.value)||0;
      if(paymentMethod==='cash' && received>0 && received < t.total){ if(!confirm('المبلغ المستلم أقل من الإجمالي، هل تريد المتابعة؟')) return; }
      await checkout(received);
      overrideSaleDate = null;
    });
    // keep the on-screen keyboard open: refocus the field the user was typing in, at the same cursor position,
    // since re-rendering payBody above replaced its DOM node and would otherwise blur it.
    if(activeId){
      const el = document.getElementById(activeId);
      if(el && typeof el.focus==='function'){
        // numeric fields: restore the exact raw string the user was typing (e.g. "16." or "16.50"),
        // since the rendered value comes from the parsed/rounded state number and would otherwise
        // silently drop an in-progress decimal point or trailing zero.
        if(activeRawVal!==null && el.dataset && el.dataset.numfield==='1' && Number(el.value)===Number(activeRawVal||0)){
          el.value = activeRawVal;
        }
        el.focus();
        if(selStart!==null && typeof el.setSelectionRange==='function'){
          try{ el.setSelectionRange(selStart, selEnd); }catch(e){}
        }
      }
    }
    saveCartDraft();
  };
  rebind();
  document.getElementById('mbg').addEventListener('click',e=>{if(e.target.id==='mbg')closeModal();});
}

/* ============================= PURCHASE SCREEN (mirrors POS/sales) ============================= */
let purchaseCart = []; let selectedSupplier = null; let purchaseQtyMultiplier = 1; let editingPurchaseInvoice = null;
let purchaseSearchVal = ""; let purchaseBrowseCat = "الكل";
function computePurchaseTotals(){
  const subtotal = purchaseCart.reduce((s,i)=>s+i.price*i.qty,0);
  return { subtotal, total: subtotal };
}
function purchaseCartListHtml(){
  if(purchaseCart.length===0) return `<div class="cart-empty"><div style="font-size:26px;">🚚</div>لا توجد أصناف بعد<br>ابحث عن صنف أو امسح الباركود لإضافته للتوريد</div>`;
  return purchaseCart.map((it,idx)=>`
    <div class="cart-row-full">
      <button class="cr-del" data-idx="${idx}">حذف</button>
      <div class="cr-box"><input type="text" value="${money(it.price*it.qty)}" readonly></div>
      <div class="cr-box"><input type="number" class="pcr-qty" data-idx="${idx}" value="${it.qty}" min="1"></div>
      <div class="cr-box"><input type="number" class="pcr-price" data-idx="${idx}" value="${it.price}" min="0" step="0.01"></div>
      <div class="cr-text"><div class="cr-name">${it.name}</div><div class="cr-sub">${it.size}/${it.color} · ${it.sku||''}</div></div>
    </div>`).join('');
}
function addToPurchaseCartBySku(val, qty){
  qty = qty || 1;
  const resolved = resolveScanCode(val);
  if(!resolved){
    if(confirm('لم يتم العثور على صنف بهذا الرمز: '+val+'\nهل تريد إضافته كمنتج جديد؟')){
      openProductForm(null, { presetBaseSku:val, onSave:(newProduct)=>{
        currentView='purchase'; render();
        if(newProduct.variants.length===1){
          const v = newProduct.variants[0];
          const existing = purchaseCart.find(i=>i.variantId===v.id);
          if(existing) existing.qty += qty;
          else purchaseCart.push({variantId:v.id, productId:newProduct.id, name:newProduct.name, size:v.size, color:v.color, price:newProduct.cost, qty, sku:v.sku});
          softRenderPurchase();
        } else {
          openVariantPicker(newProduct, 'purchase');
        }
      }});
    }
    return false;
  }
  if(resolved.multi){ openVariantPicker(resolved.product, 'purchase'); return true; }
  const found = { p: resolved.product, v: resolved.variant };
  const existing = purchaseCart.find(i=>i.variantId===found.v.id);
  if(existing) existing.qty += qty;
  else purchaseCart.push({variantId:found.v.id, productId:found.p.id, name:found.p.name, size:found.v.size, color:found.v.color, price:found.p.cost, qty, sku:found.v.sku});
  softRenderPurchase();
  return true;
}
function purchaseScreen(){
  const totQty = purchaseCart.reduce((s,i)=>s+i.qty,0);
  const t = computePurchaseTotals();
  const sup = DB.suppliers.find(s=>s.id===selectedSupplier) || DB.suppliers[0];
  return `
  <div class="pos-wrap">

      <button class="pt-icon pt-pay" id="purchCalcBtn" title="تسجيل التوريد">🧮</button>
      <button class="pt-icon" id="purchQtyModeBtn" title="ضرب الكمية">✖️${purchaseQtyMultiplier>1?`<span class="qty-badge">${purchaseQtyMultiplier}</span>`:''}</button>
      <div class="pt-search">
        <input type="text" id="purchSearch" placeholder="ابحث بالاسم أو امسح الباركود..." value="${purchaseSearchVal}" autocomplete="off">
        <div class="search-suggest" id="purchSuggest"></div>
      </div>
      <button class="pt-icon pt-cust" id="purchSupBtn" title="المورد">🤝</button>

      <button class="pt-icon pt-barcode" id="purchCamBtn" title="مسح بالكاميرا">▤</button>
    </div>
    <div style="padding:8px 16px 0;font-size:11.5px;color:var(--muted);">المورد الحالي: <strong style="color:var(--text);">${sup?sup.name:'بدون تحديد'}</strong></div>
    <div class="cart-header-row"><span>الإجمالي</span><span>الكمية</span><span>التكلفة</span><span>المنتج</span></div>
    <div class="cart-list-full" id="purchCartList">${purchaseCartListHtml()}</div>
    <button class="fab-grid" id="purchFabGrid" title="تصفح المنتجات">▦</button>
  </div>
  <div class="bottom-summary">
    <div class="bs-row">
      <div class="bs-qty">${totQty}</div>

function softRenderPurchase(){
  render();
  const search = document.getElementById('purchSearch');
  const modalOpen = document.getElementById('modalRoot').innerHTML.trim().length>0;
  if(search && !modalOpen) search.focus();
}
function bindPurchase(){
  const search = document.getElementById('purchSearch');
  const suggest = document.getElementById('purchSuggest');
  const renderSuggest = ()=>{
    const q = search.value.trim();
    purchaseSearchVal = q;
    if(!q){ suggest.classList.remove('show'); suggest.innerHTML=''; return; }
    const matches = DB.products.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()) || (p.baseSku||'').toLowerCase().includes(q.toLowerCase()) || p.variants.some(v=>v.sku.toLowerCase().includes(q.toLowerCase()))).slice(0,8);
    suggest.innerHTML = matches.length ? matches.map(p=>`<button class="suggest-row" data-pid="${p.id}"><span>${p.name}</span><span class="sg-stock">تكلفة ${money(p.cost)} ${DB.settings.currency} · مخزون ${totalStock(p)}</span></button>`).join('')
      : `<div class="suggest-row" style="color:var(--muted);">لا نتائج</div><button class="suggest-row" id="purchAddNewFromSearch" style="color:var(--h1);font-weight:800;">➕ إضافة "${q}" كمنتج جديد</button>`;
    suggest.classList.add('show');
    suggest.querySelectorAll('[data-pid]').forEach(row=>row.addEventListener('click',()=>{
      const p = DB.products.find(x=>x.id===row.dataset.pid);
      suggest.classList.remove('show'); search.value=''; purchaseSearchVal='';
      openVariantPicker(p, 'purchase');
    }));
    const addNewBtn = document.getElementById('purchAddNewFromSearch');
    if(addNewBtn) addNewBtn.addEventListener('click',()=>{
      suggest.classList.remove('show'); search.value=''; purchaseSearchVal='';
      openProductForm(null, { presetName:q, onSave:(newProduct)=>{
        currentView='purchase'; render();
        if(newProduct.variants.length===1){
          const v = newProduct.variants[0];
          const qty = purchaseQtyMultiplier;
          purchaseCart.push({variantId:v.id, productId:newProduct.id, name:newProduct.name, size:v.size, color:v.color, price:newProduct.cost, qty, sku:v.sku});
          softRenderPurchase();
        } else {
          openVariantPicker(newProduct, 'purchase');
        }
      }});
    });
  };
  search.addEventListener('input', renderSuggest);
  search.addEventListener('focus', ()=>{ if(search.value.trim()) renderSuggest(); });
  search.addEventListener('blur', ()=>{ setTimeout(()=>suggest.classList.remove('show'), 180); });
  search.addEventListener('keydown', e=>{
    if(e.key!=='Enter') return;
    const val = search.value.trim();
    search.value=''; purchaseSearchVal=''; suggest.classList.remove('show');
    if(!val) return;
    addToPurchaseCartBySku(val, purchaseQtyMultiplier);
  });
  document.getElementById('purchCamBtn').addEventListener('click',()=>{ openBarcodeScanner(val=>{ addToPurchaseCartBySku(val, purchaseQtyMultiplier); }); });
  document.getElementById('purchQtyModeBtn').addEventListener('click', openPurchaseQtyModal);
  document.getElementById('purchSupBtn').addEventListener('click', openSupplierPickerModal);
  document.getElementById('purchReprintBtn').addEventListener('click', ()=>{ if(DB.purchases.length===0){ alert('لا توجد فواتير توريد سابقة'); return; } openReprintPurchaseInvoiceModal(); });
  document.getElementById('purchCalcBtn').addEventListener('click', openConfirmPurchaseModal);
  document.getElementById('purchFabGrid').addEventListener('click', openPurchaseBrowseModal);
  document.getElementById('purchCartList').addEventListener('click', e=>{
    const btn = e.target.closest('.cr-del'); if(!btn) return;
    purchaseCart.splice(Number(btn.dataset.idx),1); softRenderPurchase();
  });
  document.getElementById('purchCartList').addEventListener('change', e=>{
    const idx = Number(e.target.dataset.idx); if(isNaN(idx)) return;
    if(e.target.classList.contains('pcr-qty')) purchaseCart[idx].qty = Math.max(1, Number(e.target.value)||1);
    else if(e.target.classList.contains('pcr-price')) purchaseCart[idx].price = Math.max(0, Number(e.target.value)||0);
    softRenderPurchase();
  });
}

  });

function showPurchaseReceipt(items, supplier, total, invoiceNo){
  const modal = document.getElementById('modalRoot');

      <div class="t-div"></div>
      ${items.map(i=>`<div class="t-item"><span>${i.name} (${i.size}/${i.color}) ×${i.qty}</span><span>${money(i.price*i.qty)}</span></div>`).join('')}

function openVariantPicker(p, mode){
  mode = mode || 'sale';
  const sizes = [...new Set(p.variants.map(v=>v.size))];
  const colors = [...new Set(p.variants.map(v=>v.color))];
  const modal = document.getElementById('modalRoot');
  modal.innerHTML = `<div class="modal-bg" id="mbg"><div class="modal"><div class="modal-body">
    <h3 style="margin-bottom:14px;">${p.name}</h3>
    <div class="field"><label>المقاس</label><div>${sizes.map(s=>`<button class="cat-chip sz-chip" data-sz="${s}">${s}</button>`).join('')}</div></div>
    <div class="field"><label>اللون</label><div>${colors.map(c=>{const v=p.variants.find(x=>x.color===c);return `<button class="cat-chip col-chip" data-col="${c}"><span class="color-dot" style="background:${v.hex}"></span> ${c}</button>`;}).join('')}</div></div>
    ${mode==='purchase' ? `
    <div class="field" id="vpNewToggleWrap">
      <button type="button" class="btn btn-sm" id="vpNewToggle">✏️ تعديل / إضافة مقاس أو لون جديد</button>
    </div>
    <div class="field" id="vpNewFields" style="display:none;">
      <label>مقاس/لون جديد</label>
      <div class="row">
        <input type="text" id="vpNewSize" placeholder="المقاس، مثال: XXL">
        <input type="text" id="vpNewColor" placeholder="اللون، مثال: بني">
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px;">اترك الحقل فارغًا لاستخدام المقاس أو اللون المختار من الأعلى. إن لم يكن هذا التوافق موجودًا لهذا المنتج سيتم إنشاؤه تلقائيًا.</div>
    </div>` : ''}
    <div id="vpFeedback" style="font-size:12px;color:var(--muted);min-height:18px;margin-bottom:10px;"></div>
    <div style="display:flex;gap:10px;"><button class="btn" id="vpCancel" style="flex:1;">إلغاء</button><button class="btn btn-primary" id="vpAdd" style="flex:2;">${mode==='purchase'?'إضافة للتوريد':'إضافة للسلة'}</button></div>
  </div></div></div>`;
  let chosenSz = sizes.length===1?sizes[0]:null;
  let chosenCol = colors.length===1?colors[0]:null;
  const refresh = ()=>{
    document.querySelectorAll('.sz-chip').forEach(b=>b.classList.toggle('active',b.dataset.sz===chosenSz));
    document.querySelectorAll('.col-chip').forEach(b=>b.classList.toggle('active',b.dataset.col===chosenCol));
    const fb = document.getElementById('vpFeedback');
    const newSzEl = document.getElementById('vpNewSize'), newColEl = document.getElementById('vpNewColor');
    const usingNew = (newSzEl && newSzEl.value.trim()) || (newColEl && newColEl.value.trim());
    if(usingNew){ fb.textContent = ''; return; }
    if(chosenSz && chosenCol){ const v = p.variants.find(x=>x.size===chosenSz && x.color===chosenCol);
      fb.textContent = v ? `المتوفر: ${v.stock} قطعة — الرمز: ${v.sku}` : 'غير متوفر'; fb.style.color = v && v.stock>0 ? 'var(--green)' : 'var(--red)';
    } else fb.textContent='';
  };
  refresh();
  document.querySelectorAll('.sz-chip').forEach(b=>b.addEventListener('click',()=>{chosenSz=b.dataset.sz;refresh();}));
  document.querySelectorAll('.col-chip').forEach(b=>b.addEventListener('click',()=>{chosenCol=b.dataset.col;refresh();}));
  if(mode==='purchase'){
    document.getElementById('vpNewToggle').addEventListener('click',()=>{
      const wrap = document.getElementById('vpNewFields');
      wrap.style.display = wrap.style.display==='none' ? 'block' : 'none';
      refresh();
    });
    document.getElementById('vpNewSize').addEventListener('input', refresh);
    document.getElementById('vpNewColor').addEventListener('input', refresh);
  }
  document.getElementById('vpCancel').addEventListener('click',closeModal);
  document.getElementById('mbg').addEventListener('click',e=>{if(e.target.id==='mbg')closeModal();});
  document.getElementById('vpAdd').addEventListener('click',()=>{
    if(mode==='purchase'){
      const newSzEl = document.getElementById('vpNewSize'), newColEl = document.getElementById('vpNewColor');
      const newSz = newSzEl ? newSzEl.value.trim() : '';
      const newCol = newColEl ? newColEl.value.trim() : '';
      const usingNew = newSz || newCol;
      if(usingNew){
        const sz = newSz || chosenSz; const col = newCol || chosenCol;
        if(!sz||!col){ alert('أدخل المقاس واللون، أو اختر أحدهما من القائمة أعلاه'); return; }
        let v = p.variants.find(x=>x.size===sz && x.color===col);
        if(!v){
          const hex = autoColorHex(col);
          let sku = genUniqueBarcode(p.id);
          while(p.variants.some(x=>x.sku===sku)) sku = genUniqueBarcode(p.id);
          v = {id:uid('v'), size:sz, color:col, hex, stock:0, reorderLevel:5, sku};
          p.variants.push(v);
        }
        const qty = purchaseQtyMultiplier;
        const existing = purchaseCart.find(i=>i.variantId===v.id);
        if(existing) existing.qty += qty;
        else purchaseCart.push({variantId:v.id, productId:p.id, name:p.name, size:v.size, color:v.color, price:p.cost, qty, sku:v.sku});
        save('products');
        closeModal(); softRenderPurchase();
        return;
      }
    }
    if(!chosenSz||!chosenCol){ alert('اختر المقاس واللون'); return; }
    const v = p.variants.find(x=>x.size===chosenSz && x.color===chosenCol);
    if(!v){ alert('هذا التوافق غير متوفر'); return; }
    if(mode==='purchase'){
      const qty = purchaseQtyMultiplier;
      const existing = purchaseCart.find(i=>i.variantId===v.id);
      if(existing) existing.qty += qty;
      else purchaseCart.push({variantId:v.id, productId:p.id, name:p.name, size:v.size, color:v.color, price:p.cost, qty, sku:v.sku});
      closeModal(); softRenderPurchase();
    } else {
      const blockOOS = DB.settings.blockSaleWhenOutOfStock;
      if(blockOOS && v.stock<=0){ alert('غير متوفر بالمخزون'); return; }
      const qty = qtyMultiplier;
      const existing = !DB.settings.allowDuplicateInCart ? cart.find(i=>i.variantId===v.id) : null;
      if(existing){ if(blockOOS && existing.qty+qty>v.stock){ alert('الكمية تتجاوز المخزون'); return; } existing.qty+=qty; }
      else{ if(blockOOS && qty>v.stock){ alert('الكمية تتجاوز المخزون'); return; } cart.push({variantId:v.id, productId:p.id, name:p.name, size:v.size, color:v.color, price:tierPrice(p), qty, sku:v.sku}); }
      playBeep();
      closeModal(); softRenderPos();
    }
  });
}

async function checkout(received){
  if(cart.length===0) return;
  const t = computeTotals();
  const cust = DB.customers.find(c=>c.id===(selectedCustomer||DB.customers[0].id)) || DB.customers[0];
  if(paymentMethod==='credit' && cust.walkIn){ alert('لا يمكن تسجيل بيع آجل لعميل نقدي، اختر عميلًا محددًا'); return; }
  if(pointsToRedeem>0 && pointsToRedeem>(cust.points||0)){ alert('عدد النقاط المدخل أكبر من رصيد العميل'); return; }
  received = Number(received)||0;
  const changeDue = paymentMethod==='cash' ? Math.max(0, received - t.total) : 0;

  if(editingSaleId){
    const old = DB.sales.find(s=>s.id===editingSaleId);
    if(!old){ alert('تعذر العثور على الفاتورة الأصلية'); editingSaleId=null; return; }
    old.items.forEach(it=>{ const p=DB.products.find(x=>x.id===it.productId); const v=p&&p.variants.find(x=>x.id===it.variantId); if(v) v.stock += it.qty; });
    cart.forEach(ci=>{ const p=DB.products.find(x=>x.id===ci.productId); const v=p&&p.variants.find(x=>x.id===ci.variantId); if(v) v.stock=Math.max(0,v.stock-ci.qty); });
    Object.assign(old, { items: cart.map(i=>({...i})), subtotal:t.subtotal, discount:t.discount, discountMode, discountAmount, discountPct, loyaltyDiscount:t.loyaltyDiscount, tax:t.tax, total:t.total,
      paymentMethod, customerId:cust.id, customerName:cust.name, receivedAmount: paymentMethod==='cash'?received:null, changeDue, note:saleNote||'', editedAt:new Date().toISOString(), editedBy:currentUser.name });
    await save('products'); await save('sales');
    showReceipt(old);
    editingSaleId=null; cart=[]; discountPct=0; discountAmount=0; discountMode='pct'; pointsToRedeem=0; paymentMethod='cash'; qtyMultiplier=1; saleNote=''; clearCartDraft();
    return;
  }

  const invNo = DB.settings.nextInvoice;
  const earned = Math.floor(t.total / DB.settings.pointsPerCurrency);
  const saleDate = (DB.settings.allowEditSaleDate && overrideSaleDate) ? overrideSaleDate.toISOString() : new Date().toISOString();
  const sale = { id:uid('s'), invoice:invNo, date:saleDate, type:'sale',
    items: cart.map(i=>({...i})), subtotal:t.subtotal, discount:t.discount, discountMode, discountAmount, discountPct, loyaltyDiscount:t.loyaltyDiscount, tax:t.tax, total:t.total,
    paymentMethod, customerId:cust.id, customerName:cust.name, cashier:currentUser.name, userId:currentUser.id, pointsRedeemed:pointsToRedeem, pointsEarned:earned,
    receivedAmount: paymentMethod==='cash' ? received : null, changeDue, note:saleNote||'' };
  cart.forEach(ci=>{ const p = DB.products.find(x=>x.id===ci.productId); const v = p.variants.find(x=>x.id===ci.variantId); if(v) v.stock = Math.max(0, v.stock - ci.qty); });
  if(!cust.walkIn){ cust.points = Math.max(0,(cust.points||0) - pointsToRedeem) + earned; }
  if(paymentMethod==='credit'){ cust.balance = (cust.balance||0) + t.total; }
  DB.sales.unshift(sale); DB.settings.nextInvoice = invNo+1;
  await save('products'); await save('sales'); await save('settings'); await save('customers');
  playBeep();
  showReceipt(sale);
  cart=[]; discountPct=0; discountAmount=0; discountMode='pct'; pointsToRedeem=0; paymentMethod='cash'; qtyMultiplier=1; overrideSaleDate=null; saleNote=''; clearCartDraft();
}
