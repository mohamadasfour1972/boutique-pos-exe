function buildInvoiceWhatsappText(sale){
  const s = DB.settings;
  const L = (key,fallback)=> (s.invoiceLabels && s.invoiceLabels[key]) || fallback;
  let lines = [];
  lines.push(`*${s.storeName||''}*`);
  lines.push(`${sale.type==='return'?L('returnBill','إشعار إرجاع'):L('salesBill','فاتورة مبيعات')} #${sale.invoice}`);
  lines.push(`${L('date','التاريخ')}: ${fmtDT(sale.date)}`);
  lines.push(`${L('clientName','العميل')}: ${sale.customerName}`);
  lines.push('-------------------------');
  sale.items.forEach(i=>{ lines.push(`${i.name} (${i.size}/${i.color}) ×${i.qty} — ${money(i.price*i.qty)}`); });
  lines.push('-------------------------');
  lines.push(`${L('total','المجموع الفرعي')}: ${money(sale.subtotal)}`);
  if(sale.discount) lines.push(`${L('discount','الخصم')}: -${money(sale.discount)}`);
  if(sale.loyaltyDiscount) lines.push(`خصم النقاط: -${money(sale.loyaltyDiscount)}`);
  if(sale.tax) lines.push(`${L('tax','الضريبة')}: ${money(sale.tax)}`);
  lines.push(`*${L('netInvoice','الإجمالي')}: ${money(sale.total)} ${s.currency}*`);
  if(sale.paymentMethod==='cash' && sale.receivedAmount){
    lines.push(`${L('paid','المستلم')}: ${money(sale.receivedAmount)}`);
    lines.push(`${L('balance','الباقي')}: ${money(sale.changeDue||0)}`);
  }
  lines.push(sale.paymentMethod==='cash'?L('cash','دفع نقدي'):sale.paymentMethod==='card'?L('card','دفع بالبطاقة'):L('credit','دفع آجل (على الحساب)'));
  if(s.receiptFooter) lines.push(s.receiptFooter);
  return lines.join('\n');
}

function sendInvoiceViaWhatsapp(sale){
  const text = buildInvoiceWhatsappText(sale);
  // Preferred path: native OS share sheet. This lets the person pick WhatsApp, WhatsApp
  // Business, SMS, or any other installed app — matching the standard Android share menu
  // — instead of us guessing which app/number to hard-code.
  if(navigator.share){
    navigator.share({ title:`فاتورة #${sale.invoice}`, text }).catch(()=>{ /* user cancelled or share failed silently */ });
    return;
  }
  // Fallback for older WebViews without Web Share API support: go straight to WhatsApp via wa.me
  const cust = sale.customerId ? DB.customers.find(c=>c.id===sale.customerId) : null;
  let defaultPhone = (cust && !cust.walkIn && cust.phone && cust.phone!=='-') ? cust.phone.replace(/\D/g,'') : '';
  if(defaultPhone.startsWith('0')) defaultPhone = defaultPhone.slice(1);
  const input = prompt('رقم واتساب المستلم (مع رمز الدولة، بدون + أو أصفار في البداية):', defaultPhone);
  if(!input) return;
  const phone = input.replace(/\D/g,'');
  if(phone.length<8){ alert('رقم غير صالح، تأكد من كتابته مع رمز الدولة (مثال: 964770xxxxxxx)'); return; }
  const waUrl = `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;
  // window.open is silently blocked inside Android WebView wrappers (no popup-window
  // handler), so navigate directly instead — this is what lets the OS hand off to the
  // installed WhatsApp app via its intent filter.
  try{
    window.location.href = waUrl;
  }catch(e){
    // Fallback for normal desktop/mobile browsers where a direct nav might get intercepted
    const a = document.createElement('a');
    a.href = waUrl; a.target = '_blank'; a.rel = 'noopener';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }

}

    }

      alert('رقم الباركود الأساسي يطابق رمز مقاس/لون في منتج آخر، أدخل رقمًا مختلفًا'); return;
    }
    if(draft.variants.some(dv=>others.some(p=>p.baseSku===dv.sku))){
      alert('رمز أحد المقاسات/الألوان يطابق الباركود الأساسي لمنتج آخر، عدّله من قائمة المقاسات'); return;

    if(dupSkuInOther){ alert('يوجد رمز صنف مستخدم في منتج آخر، الرجاء تعديل الرمز المخصص'); return; }
    if(!DB.categories.includes(draft.category)){ DB.categories.push(draft.category); await save('categories'); }
    if(isNew) DB.products.push(draft); else { const i = DB.products.findIndex(p=>p.id===draft.id); DB.products[i]=draft; }
    await save('products'); closeModal();

    else { currentView='products'; render(); }
  });

    });

  });
}

/* ---- Inline CODE39 barcode generator (no external library / CDN needed) ---- */
const CODE39_PATTERNS = {
  '0':'000110100','1':'100100001','2':'001100001','3':'101100000','4':'000110001',
  '5':'100110000','6':'001110000','7':'000100101','8':'100100100','9':'001100100',
  '*':'010010100'
};
function svgBarcode39(code, opts){
  opts = opts||{};
  const narrow = opts.narrow||2, wide = narrow*3, barHeight = opts.height||42;
  const chars = ('*'+String(code).replace(/[^0-9]/g,'')+'*').split('');
  let x = 0;
  const bars = [];
  chars.forEach((ch,ci)=>{
    const pattern = CODE39_PATTERNS[ch] || CODE39_PATTERNS['0'];
    for(let i=0;i<pattern.length;i++){
      const isBar = i%2===0; // pattern alternates bar,space,bar,space...bar (9 elements, 5 bars)
      const w = pattern[i]==='1' ? wide : narrow;
      if(isBar) bars.push(`<rect x="${x}" y="0" width="${w}" height="${barHeight}" fill="#111"/>`);
      x += w;
    }
    if(ci < chars.length-1) x += narrow; // inter-character gap
  });
  const totalWidth = x;
  return `<svg viewBox="0 0 ${totalWidth} ${barHeight}" width="100%" height="${barHeight}" preserveAspectRatio="none" style="display:block;">${bars.join('')}</svg>`;
}

// Simple, dependency-free CSV parser (handles quoted fields, commas/semicolons, CRLF, UTF-8/Arabic text)
function parseCSVText(text){
  text = text.replace(/^\uFEFF/, ''); // strip BOM
  // detect delimiter: comma vs semicolon (common in Arabic-locale Excel exports)
  const sampleLine = text.split(/\r\n|\n/,1)[0] || '';
  const delim = (sampleLine.split(';').length > sampleLine.split(',').length) ? ';' : ',';
  const rows = []; let row = []; let field = ''; let inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i], next = text[i+1];
    if(inQuotes){
      if(c === '"' && next === '"'){ field += '"'; i++; }
      else if(c === '"'){ inQuotes = false; }
      else { field += c; }
    } else {
      if(c === '"'){ inQuotes = true; }
      else if(c === delim){ row.push(field); field=''; }
      else if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else if(c === '\r'){ /* skip, \n handles the break */ }
      else { field += c; }
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r=>r.some(c=>String(c||'').trim()!==''));
}
function isCsvFile(file){
  return /\.csv$/i.test(file.name) || file.type === 'text/csv';
}
// Try multiple CDN mirrors in sequence, since some WebViews block specific CDN domains
const XLSX_CDN_MIRRORS = [
  'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js',
  'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js',
  'https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js'
];
function loadXLSX(cb, onFail){
  if(window.XLSX){ cb(); return; }
  let idx = 0;
  const tryNext = ()=>{
    if(idx >= XLSX_CDN_MIRRORS.length){ if(onFail) onFail(); return; }
    const s = document.createElement('script');
    s.src = XLSX_CDN_MIRRORS[idx];
    const timeout = setTimeout(()=>{ idx++; tryNext(); }, 6000);
    s.onload = ()=>{ clearTimeout(timeout); if(window.XLSX) cb(); else { idx++; tryNext(); } };
    s.onerror = ()=>{ clearTimeout(timeout); idx++; tryNext(); };
    document.body.appendChild(s);
  };
  tryNext();
}

function guessColumnMap(headers){
  const map = {};
  IMPORT_TARGET_FIELDS.forEach(f=>{
    let idx = headers.findIndex(h=>String(h||'').trim().toLowerCase()===f.key);
    if(idx===-1) idx = headers.findIndex(h=>f.synonyms.some(syn=>String(h||'').toLowerCase().includes(syn)));
    map[f.key] = idx;
  });
  return map;
}
function bindImportProducts(){
  let headers = null, dataRows = null, columnMap = {};
  const fileInput = document.getElementById('impFile');
  const status = document.getElementById('impStatus');
  const mapSection = document.getElementById('mapSection');
  function handleRows(rows){
    headers = (rows[0]||[]).map(h=>String(h||'').trim());
    dataRows = rows.slice(1).filter(r=>r.length && r.some(c=>c!==undefined && c!==''));
    if(dataRows.length===0){ status.textContent='لم يتم العثور على بيانات في الملف.'; mapSection.innerHTML=''; return; }
    columnMap = guessColumnMap(headers);
    status.textContent = `تم العثور على ${dataRows.length} صف و ${headers.length} عمود`;
    renderMapUI();
  }
  fileInput.addEventListener('change', ()=>{
    const file = fileInput.files[0]; if(!file) return;
    if(isCsvFile(file)){
      status.textContent = 'جارٍ القراءة...';
      const reader = new FileReader();
      reader.onload = e=>{
        try{ handleRows(parseCSVText(e.target.result)); }
        catch(err){ status.textContent = 'تعذر قراءة ملف CSV. تأكد من التنسيق.'; }
      };
      reader.readAsText(file, 'UTF-8');
      return;
    }
    status.textContent = 'جارٍ تحميل أداة قراءة اكسل...';
    loadXLSX(()=>{
      const reader = new FileReader();
      reader.onload = e=>{
        try{
          const wb = XLSX.read(e.target.result, {type:'binary'});
          const sheet = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(sheet, {header:1});
          handleRows(rows);
        }catch(err){ status.textContent = 'تعذر قراءة الملف. تأكد من الصيغة.'; }
      };
      reader.readAsBinaryString(file);
    }, ()=>{
      status.innerHTML = 'تعذر تحميل أداة قراءة ملفات Excel (الاتصال بالإنترنت غير متاح داخل التطبيق).<br>الحل: احفظ الملف بصيغة <b>CSV</b> من برنامج Excel (File → Save As → CSV) وارفعه بدل ذلك.';
    });
  });

  function renderMapUI(){
    mapSection.innerHTML = `
    <div class="panel">
      <h3 style="margin-top:0;font-size:15px;">مطابقة الأعمدة والتحقق</h3>
      <p style="font-size:12px;color:var(--muted);margin-bottom:14px;">طابقنا أعمدة ملفك تلقائيًا. عدّل أي عمود إن لزم، ثم تحقق من المعاينة قبل الاستيراد.</p>
      <div style="border:1px solid var(--border);border-radius:10px;overflow:hidden;">
        <div style="display:flex;background:var(--bg);padding:10px 12px;font-size:11px;font-weight:800;color:var(--muted);"><span style="flex:1;">حقل المنتج</span><span style="flex:1;text-align:left;">عمود الملف المطابق</span></div>
        ${IMPORT_TARGET_FIELDS.map(f=>`
          <div style="display:flex;align-items:center;padding:10px 12px;border-top:1px solid var(--border);gap:10px;">
            <span style="flex:1;font-size:13px;font-weight:700;">${f.label}${f.required?' *':''}</span>
            <select data-map="${f.key}" style="flex:1;">
              <option value="-1">— تجاهل —</option>
              ${headers.map((h,idx)=>`<option value="${idx}" ${columnMap[f.key]===idx?'selected':''}>${h||'عمود '+(idx+1)}</option>`).join('')}
            </select>
          </div>`).join('')}
      </div>
      <button class="btn btn-block" id="previewBtn" style="margin-top:14px;">👁️ معاينة</button>
      <div id="previewArea" style="margin-top:14px;"></div>
      <button class="btn btn-primary btn-block" id="confirmImportBtn" style="margin-top:10px;display:none;">✅ تأكيد الاستيراد</button>
    </div>`;
    mapSection.querySelectorAll('[data-map]').forEach(sel=>sel.addEventListener('change', e=>{
      columnMap[e.target.dataset.map] = Number(e.target.value);
      document.getElementById('confirmImportBtn').style.display='none';
      document.getElementById('previewArea').innerHTML='';
    }));
    document.getElementById('previewBtn').addEventListener('click', ()=>{
      if(columnMap.name===undefined || columnMap.name<0){ alert('الرجاء تحديد عمود "الاسم" على الأقل'); return; }
      const mapped = buildMappedRows().slice(0,5);
      document.getElementById('previewArea').innerHTML = `
        <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">معاينة أول ${mapped.length} صف من أصل ${dataRows.length}:</div>
        <div style="overflow:auto;">
        <table><thead><tr><th>الاسم</th><th>التصنيف</th><th>السعر</th><th>التكلفة</th><th>المقاس</th><th>اللون</th><th>المخزون</th></tr></thead>
        <tbody>${mapped.map(r=>`<tr><td>${r.name}</td><td>${r.category}</td><td>${r.price}</td><td>${r.cost}</td><td>${r.size}</td><td>${r.color}</td><td>${r.stock}</td></tr>`).join('')}</tbody></table>
        </div>`;
      document.getElementById('confirmImportBtn').style.display='block';
    });
    document.getElementById('confirmImportBtn').addEventListener('click', runImport);
  }

  function buildMappedRows(){
    return dataRows.map(r=>({
      name: columnMap.name>=0 ? String(r[columnMap.name]||'').trim() : '',
      baseSku: columnMap.baseSku>=0 ? String(r[columnMap.baseSku]||'').trim() : '',
      category: columnMap.category>=0 ? String(r[columnMap.category]||'عام').trim() : 'عام',
      price: columnMap.price>=0 ? Number(r[columnMap.price])||0 : 0,
      cost: columnMap.cost>=0 ? Number(r[columnMap.cost])||0 : 0,
      size: columnMap.size>=0 ? String(r[columnMap.size]||'-').trim() : '-',
      color: columnMap.color>=0 ? String(r[columnMap.color]||'-').trim() : '-',
      stock: columnMap.stock>=0 ? Number(r[columnMap.stock])||0 : 0,
      sku: columnMap.sku>=0 ? String(r[columnMap.sku]||'').trim() : '',
    })).filter(r=>r.name);
  }

  async function runImport(){
    const rows = buildMappedRows();
    const grouped = {};
    rows.forEach(row=>{
      const key = row.name.toLowerCase();
      if(!grouped[key]) grouped[key] = { name:row.name, baseSku:row.baseSku, category:row.category, price:row.price, cost:row.cost, variants:[] };
      if(grouped[key].variants.some(v=>v.size===row.size && v.color===row.color)) return;
      const sku = row.sku || genUniqueBarcode();
      grouped[key].variants.push({ id:uid('v'), size:row.size, color:row.color, hex:'#8A7F6E', stock:row.stock, reorderLevel:5, sku });
    });
    const allSkusInUse = new Set(DB.products.flatMap(p=>[p.baseSku, ...p.variants.map(v=>v.sku)]).filter(Boolean));
    let newProducts=0, mergedIntoExisting=0, skippedVariants=0, regeneratedBaseSkus=0;
    Object.values(grouped).forEach(g=>{
      const existing = DB.products.find(p=>p.name.trim().toLowerCase()===g.name.toLowerCase());
      if(existing){
        g.variants.forEach(v=>{
          const dup = existing.variants.some(ev=>ev.size===v.size && ev.color===v.color);
          if(dup || allSkusInUse.has(v.sku)){ skippedVariants++; return; }
          existing.variants.push(v); allSkusInUse.add(v.sku);
        });
        mergedIntoExisting++;
      } else {
        const uniqueVariants = g.variants.filter(v=>{
          if(allSkusInUse.has(v.sku)){ skippedVariants++; return false; }
          allSkusInUse.add(v.sku); return true;
        });
        if(uniqueVariants.length===0) return;
        let baseSku = g.baseSku;
        if(!baseSku || allSkusInUse.has(baseSku)){ if(g.baseSku) regeneratedBaseSkus++; baseSku = genUniqueBarcode(); }
        allSkusInUse.add(baseSku);
        DB.products.push({ id:uid('p'), name:g.name, category:g.category, price:g.price, price2:0, price3:0, cost:g.cost, emoji:'👕', baseSku, variants:uniqueVariants });
        if(!DB.categories.includes(g.category)) DB.categories.push(g.category);
        newProducts++;
      }
    });
    await save('products'); await save('categories');
    alert(`تم الاستيراد: ${newProducts} منتج جديد، ودُمجت أصناف داخل ${mergedIntoExisting} منتج موجود مسبقًا${skippedVariants?`، وتم تجاهل ${skippedVariants} صف مكرر`:''}${regeneratedBaseSkus?`، وتم توليد باركود جديد لـ${regeneratedBaseSkus} منتج بسبب تكرار الباركود في الملف`:''}.`);
    currentView='products'; render();
  }
}

function openCustomerForm(cust, onSaved){
  const isNew=!cust;
  const draft = cust? {...cust} : {id:uid('c'), name:'', phone:'', notes:'', points:0, balance:0};
  const modal = document.getElementById('modalRoot');
  modal.innerHTML = `<div class="modal-bg" id="mbg"><div class="modal"><div class="modal-body">

      <div class="field"><label>نقاط الولاء</label><input type="number" id="cf_points" value="${draft.points||0}"></div>
      <div class="field"><label>الرصيد الافتتاحي (ذمم آجلة)</label><input type="number" id="cf_balance" value="${draft.balance||0}"></div>
    </div>
    <div class="field"><label>ملاحظات</label><textarea id="cf_notes" rows="3">${draft.notes||''}</textarea></div>
    <div style="display:flex;gap:10px;"><button class="btn" id="cfCancel" style="flex:1;">إلغاء</button><button class="btn btn-primary" id="cfSave" style="flex:2;">حفظ</button></div>
  </div></div></div>`;
  document.getElementById('cfCancel').addEventListener('click',closeModal);
  document.getElementById('mbg').addEventListener('click',e=>{if(e.target.id==='mbg')closeModal();});
  document.getElementById('cfSave').addEventListener('click', async ()=>{
    draft.name=document.getElementById('cf_name').value.trim();
    draft.phone=document.getElementById('cf_phone').value.trim();
    draft.points=Number(document.getElementById('cf_points').value)||0;
    draft.balance=Number(document.getElementById('cf_balance').value)||0;
    draft.notes=document.getElementById('cf_notes').value.trim();
    if(!draft.name){ alert('أدخل اسم العميل'); return; }
    if(isNew) DB.customers.push(draft); else { const i=DB.customers.findIndex(c=>c.id===draft.id); DB.customers[i]=draft; }
    await save('customers');
    if(onSaved){ onSaved(draft); }
    else { closeModal(); currentView='customers'; render(); }
  });
}

  return `

function bindReturns(){
  document.getElementById('retSearchBtn').addEventListener('click',doReturnSearch);
  document.getElementById('retInvoice').addEventListener('keydown',e=>{if(e.key==='Enter')doReturnSearch();});
}
function doReturnSearch(){
  returnLookupInvoice = document.getElementById('retInvoice').value.trim();
  const sale = DB.sales.find(s=>String(s.invoice)===returnLookupInvoice);
  const box = document.getElementById('retResult');
  if(!sale){ box.innerHTML = `<div class="empty-state"><div class="em-ic">🔍</div>لم يتم العثور على فاتورة بهذا الرقم</div>`; return; }
  box.innerHTML = `<div class="panel">
    <div style="display:flex;justify-content:space-between;margin-bottom:14px;"><strong>فاتورة #${sale.invoice} — ${sale.customerName}</strong><span style="font-size:12px;color:var(--muted);">${fmtDT(sale.date)}</span></div>
    ${sale.items.map((it,idx)=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px dashed var(--border);">
      <div style="flex:1;font-size:13px;">${it.name} (${it.size}/${it.color})</div><div style="font-size:12px;color:var(--muted);">مباع: ${it.qty}</div>
      <input type="number" class="retQty" data-idx="${idx}" min="0" max="${it.qty}" value="0" style="max-width:80px;">
    </div>`).join('')}
    <button class="btn btn-danger btn-block" id="confirmReturnBtn" style="margin-top:14px;">تأكيد الإرجاع</button>
  </div>`;
  document.getElementById('confirmReturnBtn').addEventListener('click', async ()=>{
    const qtys = Array.from(document.querySelectorAll('.retQty')).map(i=>Number(i.value)||0);
    const items = sale.items.map((it,idx)=>({...it, qty:qtys[idx]})).filter(it=>it.qty>0);
    if(items.length===0){ alert('أدخل كمية إرجاع لصنف واحد على الأقل'); return; }
    const total = items.reduce((s,i)=>s+i.price*i.qty,0);
    const ret = { id:uid('r'), invoice:sale.invoice, saleId:sale.id, date:new Date().toISOString(), items, total, userId:currentUser.id, cashier:currentUser.name };
    items.forEach(it=>{ const p = DB.products.find(x=>x.id===it.productId); const v = p && p.variants.find(x=>x.id===it.variantId); if(v) v.stock += it.qty; });
    DB.returns.unshift(ret); await save('returns'); await save('products');
    alert('تم تسجيل الإرجاع وإعادة الأصناف للمخزون'); returnLookupInvoice=''; render();
  });
}

    <button class="btn btn-danger btn-block" id="closeShiftBtn">إغلاق الوردية وتسجيل الخروج</button>
  </div>`;
}
function bindCash(){
  document.querySelectorAll('[data-mode]').forEach(b=>b.addEventListener('click',()=>{
    cashMode=b.dataset.mode;
    document.getElementById('dot-add').classList.toggle('on-green',cashMode==='add');
    document.getElementById('dot-sub').classList.toggle('on-red',cashMode==='sub');
  }));
  document.querySelectorAll('[data-tg]').forEach(sw=>sw.addEventListener('click',()=>{
    const k = sw.dataset.tg; cashToggles[k] = !cashToggles[k]; sw.classList.toggle('on', cashToggles[k]);
    const st = shiftStats(currentShift, cashToggles); document.getElementById('bbVal').textContent = money(st.expected);
  }));
  document.getElementById('adjApply').addEventListener('click', async ()=>{
    const amount = Number(document.getElementById('adjAmount').value)||0;
    if(amount<=0){ alert('أدخل مبلغًا صحيحًا'); return; }
    const note = document.getElementById('adjNote').value.trim();
    currentShift.adjustments = currentShift.adjustments||[];
    currentShift.adjustments.push({type:cashMode, amount, note, date:new Date().toISOString()});
    await save('shifts'); render();
  });
  document.getElementById('closeShiftBtn').addEventListener('click', async ()=>{
    const closing = Number(document.getElementById('closingCash').value)||0;
    const st = shiftStats(currentShift, cashToggles);
    currentShift.closeTime = new Date().toISOString(); currentShift.closingCash = closing; currentShift.expectedCash = st.expected; currentShift.difference = closing - st.expected;
    await save('shifts');
    alert(`تم إغلاق الوردية.\nالمتوقع: ${money(st.expected)}\nالفعلي: ${money(closing)}\nالفرق: ${money(currentShift.difference)}`);
    currentUser=null; currentShift=null; showGate();
  });
}

function qrStoreMoveHtml(){
  const salesP = reportSalesInPeriod().filter(s=>s.status!=='cancelled');
  const purchasesP = reportPurchasesInPeriod();
  const from = new Date(reportDateFrom+'T00:00:00'), to = new Date(reportDateTo+'T23:59:59');
  const inPeriod = arr => (arr||[]).filter(x=>{ const d=new Date(x.date); return d>=from && d<=to; });
  const salesReturnsP = inPeriod(DB.returns);
  const purchaseReturnsP = inPeriod(DB.purchaseReturns);
  const expensesP = inPeriod(DB.expenses);
  const custPaymentsP = inPeriod(DB.customerPayments);
  const supPaymentsP = inPeriod(DB.supplierPayments);

  const salesTotal = salesP.reduce((s,x)=>s+x.total,0);
  const salesCash = salesP.filter(s=>s.paymentMethod==='cash').reduce((s,x)=>s+x.total,0);
  const salesCredit = salesP.filter(s=>s.paymentMethod==='credit').reduce((s,x)=>s+x.total,0);
  const salesCard = salesP.filter(s=>s.paymentMethod==='card').reduce((s,x)=>s+x.total,0);
  const salesReturnsTotal = salesReturnsP.reduce((s,r)=>s+r.total,0);
  const discountsTotal = salesP.reduce((s,x)=>s+(x.discount||0),0);
  const taxTotal = salesP.reduce((s,x)=>s+(x.tax||0),0);
  const custBalanceTotal = DB.customers.reduce((s,c)=>s+(c.balance||0),0);
  const custPaymentsTotal = custPaymentsP.reduce((s,p)=>s+p.amount,0);

  const cogs = salesP.reduce((s,sale)=>s+sale.items.reduce((a,it)=>{ const p=DB.products.find(x=>x.id===it.productId); return a+(p?p.cost:0)*it.qty; },0),0);
  const grossProfit = salesTotal - cogs;
  const expensesTotal = expensesP.reduce((s,e)=>s+e.amount,0);
  const netProfitAfterExpenses = grossProfit - expensesTotal;

  const purchasesTotal = purchasesP.reduce((s,x)=>s+x.total,0);
  const purchasesReturnsTotal = purchaseReturnsP.reduce((s,r)=>s+r.total,0);
  const supplierPurchaseTotals = {}; DB.purchases.forEach(p=>{ if(p.supplierId) supplierPurchaseTotals[p.supplierId]=(supplierPurchaseTotals[p.supplierId]||0)+p.total; });

  const supPaymentsTotal = supPaymentsP.reduce((s,p)=>s+p.amount,0);

  ${kvSection('المشتريات','🤑')}

  ${kvRow('إجمالي المشتريات نقدأ', money(purchasesTotal))}

  ${kvRow('إجمالي المشتريات (بطاقة)', money(0))}

  const costOf = sale => sale.items.reduce((a,it)=>{ const p=DB.products.find(x=>x.id===it.productId); return a+(p?p.cost:0)*it.qty; },0);

}
function qrProfitByItemHtml(){
  const { list, returnsTotal, discount } = qrProfitPeriodBasics();
  const map = {};
  list.forEach(s=>s.items.forEach(it=>{
    const p = DB.products.find(x=>x.id===it.productId);
    const cost = (p?p.cost:0) * it.qty;
    const rev = it.price*it.qty;
    if(!map[it.name]) map[it.name] = { name:it.name, cost:0, qty:0, rev:0 };
    map[it.name].cost += cost; map[it.name].qty += it.qty; map[it.name].rev += rev;
  }));
  const rows = Object.values(map).sort((a,b)=>b.rev-a.rev);

function exportSalesExcel(withProducts){
  loadXLSX(()=>{
    try{
      const wb = XLSX.utils.book_new();
      const list = reportSalesInPeriod();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(list.map(s=>({
        'رقم الفاتورة':s.invoice, 'التاريخ':fmtDT(s.date), 'العميل':s.customerName||'-',
        'طريقة الدفع':s.paymentMethod==='cash'?'نقدي':s.paymentMethod==='card'?'بطاقة':'آجل',
        'الإجمالي الفرعي':s.subtotal||s.total, 'الخصم':s.discount||0, 'الإجمالي':s.total
      }))), 'المبيعات');
      if(withProducts){
        const itemRows = [];
        list.forEach(s=>s.items.forEach(it=>{
          itemRows.push({ 'رقم الفاتورة':s.invoice, 'التاريخ':fmtDT(s.date), 'الصنف':it.name, 'المقاس':it.size, 'اللون':it.color, 'الكمية':it.qty, 'السعر':it.price, 'الإجمالي':it.price*it.qty });
        }));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(itemRows), 'المنتجات المباعة');
      }
      XLSX.writeFile(wb, `تقرير-المبيعات-${reportDateFrom}-الى-${reportDateTo}.xlsx`);
    }catch(err){ alert('تعذر إنشاء ملف Excel: '+err.message); }
  });
}

function qrCustomerStatementHtml(){
  const cust = DB.customers.find(c=>c.id===reportCustomerChoice);
  if(!cust) return qrComingSoonHtml();
  const detailed = !!reportToggleState['customerStatement.detailed'];
  const hideBalanceCol = !!reportToggleState['customerStatement.hideBalanceCol'];
  const hideOpening = !!reportToggleState['customerStatement.hideOpeningBalance'];
  const showCash = !!reportToggleState['customerStatement.showCashInvoices'];
  const from = new Date(reportDateFrom+'T00:00:00'), to = new Date(reportDateTo+'T23:59:59');
  const fmtD = d => { const dt=new Date(d); return `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`; };

  const allSales = DB.sales.filter(s=>s.customerId===cust.id && s.status!=='cancelled' && (showCash || s.paymentMethod==='credit'));
  const allPayments = DB.customerPayments.filter(p=>p.customerId===cust.id);
  const allReturns = DB.returns.filter(r=>{ const s = DB.sales.find(x=>x.id===r.saleId); return s && s.customerId===cust.id; });

  const entries = [];
  allSales.forEach(s=> entries.push({ date:new Date(s.date), debit:s.total, credit:0, desc:`فاتورة بيع #${s.invoice}` }));
  allPayments.forEach(p=> entries.push({ date:new Date(p.date), debit:0, credit:p.amount, desc:`سند قبض` }));
  allReturns.forEach(r=> entries.push({ date:new Date(r.date), debit:0, credit:r.total, desc:`فاتورة مرتجع #${r.invoice}` }));
  entries.sort((a,b)=>a.date-b.date);

  const before = entries.filter(e=>e.date < from);
  const within = entries.filter(e=>e.date >= from && e.date <= to);
  const openingBalance = before.reduce((s,e)=>s+e.debit-e.credit, 0);

  let running = openingBalance;
  const rows = [];
  if(!hideOpening){
    const dayBefore = new Date(from.getTime()-86400000);
    rows.push({ idx:'', date:fmtD(dayBefore), desc:`حتى تاريخ ${fmtD(dayBefore)}`, credit:0, debit:0, balance:openingBalance });
  }
  if(detailed){
    within.forEach((e,i)=>{ running += e.debit - e.credit; rows.push({ idx:i+1, date:fmtD(e.date), desc:e.desc, credit:e.credit, debit:e.debit, balance:running }); });
  }
  const periodDebit = within.reduce((s,e)=>s+e.debit,0);
  const periodCredit = within.reduce((s,e)=>s+e.credit,0);
  const finalBalance = openingBalance + periodDebit - periodCredit;

  const td = 'border:1px solid #ccc;padding:5px;';
  const header = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;font-size:12px;margin-bottom:10px;">
      <div>التاريخ: ${new Date().toLocaleDateString('en-GB')}<br>الوقت: ${new Date().toLocaleTimeString('en-US')}</div>
      <div style="text-align:left;font-weight:800;color:#2563eb;">${DB.settings.storeName||'MicroPOS'}</div>
    </div>
    <div style="text-align:center;font-weight:800;font-size:15px;margin-bottom:4px;">كشف حساب عميل</div>
    <div style="text-align:center;font-size:12px;color:#555;margin-bottom:4px;">للفترة من ${reportDateFrom} الي ${reportDateTo}</div>
    <div style="text-align:center;font-size:12.5px;font-weight:700;margin-bottom:12px;">اسم العميل: ${cust.name}</div>`;

  const rowsHtml = rows.map(r=>`<tr>
    <td style="${td}text-align:center;">${r.idx}</td>
    <td style="${td}text-align:center;">${r.date}</td>
    <td style="${td}text-align:center;color:#2e7d32;">${money(r.credit)}</td>
    <td style="${td}text-align:center;color:#c62828;">${money(r.debit)}</td>
    ${hideBalanceCol?'':`<td style="${td}text-align:center;">${money(r.balance)}</td>`}
    <td style="${td}text-align:right;">${r.desc}</td>
  </tr>`).join('');
  const totalsRow = `<tr style="font-weight:700;">
    <td style="${td}"></td><td style="${td}"></td>
    <td style="${td}text-align:center;">${money(periodCredit)}</td>
    <td style="${td}text-align:center;">${money(periodDebit)}</td>
    ${hideBalanceCol?'':`<td style="${td}"></td>`}
    <td style="${td}"></td>
  </tr>`;

  return `${header}
  <table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:10px;">
    <thead><tr style="background:#f0f0f0;font-weight:800;">
      <th style="${td}">#</th><th style="${td}">التاريخ</th><th style="${td}">له</th><th style="${td}">عليه</th>
      ${hideBalanceCol?'':`<th style="${td}">الرصيد</th>`}<th style="${td}">البيان</th>
    </tr></thead>
    <tbody>${rowsHtml || `<tr><td colspan="6" style="${td}text-align:center;color:#888;">لا توجد حركات ضمن الفترة المحددة</td></tr>`}${totalsRow}</tbody>
  </table>
  <div style="text-align:left;font-weight:800;font-size:15px;color:${finalBalance>0?'#c62828':'#2e7d32'};">الإجمالي: ${money(Math.abs(finalBalance))} ${DB.settings.currency}</div>`;
}

    </tr>`).join('') : `<tr><td colspan="8" style="${td}text-align:center;color:#888;">لا توجد منتجات لعرضها</td></tr>`;
  const table = `<table style="width:100%;border-collapse:collapse;font-size:11.5px;" dir="rtl">
    <thead><tr style="background:#eef1f5;">
      <th style="${td}">#</th><th style="${td}">اسم المنتج</th><th style="${td}">الكمية في المخزن</th>
      <th style="${td}">الكمية المباعة</th><th style="${td}">الكمية المرتجعه</th><th style="${td}">إجمالي الكمية</th>

  return header + table;

function exportReportExcel(key){
  loadXLSX(()=>{
    try{
      const item = reportFindItem(key); const title = item? item.label : 'تقرير';
      const bodyHtml = getReportHtmlBody(key);
      const holder = document.createElement('div');
      holder.style.cssText = 'position:absolute;left:-9999px;top:-9999px;';
      holder.innerHTML = bodyHtml;
      document.body.appendChild(holder);
      const wb = XLSX.utils.book_new();
      const tables = holder.querySelectorAll('table');
      if(tables.length){
        tables.forEach((tbl,i)=>{
          const ws = XLSX.utils.table_to_sheet(tbl);
          XLSX.utils.book_append_sheet(wb, ws, tables.length>1?`جدول ${i+1}`:'التقرير');
        });
      } else {
        // no real <table> in this report's markup (it's a div-based list) — scrape rows into a simple sheet instead
        const aoa = [[title],[`${DB.settings.storeName||''} - للفترة من ${reportDateFrom} الى ${reportDateTo}`],[]];
        holder.querySelectorAll('.tot-row, .stock-row, .p-sub').forEach(row=>{
          const spans = row.querySelectorAll(':scope > span');
          if(spans.length>=2){ aoa.push([spans[0].textContent.trim(), spans[spans.length-1].textContent.trim()]); }
          else{ const t = row.textContent.replace(/\s+/g,' ').trim(); if(t) aoa.push([t]); }
        });
        if(aoa.length===3) aoa.push(['لا توجد بيانات لعرضها']);
        const ws = XLSX.utils.aoa_to_sheet(aoa);
        XLSX.utils.book_append_sheet(wb, ws, 'التقرير');
      }
      document.body.removeChild(holder);
      const safeTitle = title.replace(/[\\/:*?"<>|]/g,'-');
      XLSX.writeFile(wb, `${safeTitle}-${reportDateFrom}-الى-${reportDateTo}.xlsx`);
    }catch(e){ console.error('exportReportExcel failed', e); alert('تعذر إنشاء ملف Excel لهذا التقرير'); }
  });
}

  }
  const item = reportFindItem(key);

async function shareOrDownloadFile(data, fileName, mimeType, statusEl){
  try{
    const file = new File([data], fileName, {type: mimeType});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title: fileName});
      if(statusEl) statusEl.textContent = '✅ افتحت قائمة المشاركة — اختر Google Drive لرفع الملف.';
      return;
    }
  }catch(e){
    if(e && e.name==='AbortError'){ if(statusEl) statusEl.textContent = 'تم إلغاء المشاركة.'; return; }
    console.error('share failed', e);
  }
  // Fallback: the browser/WebView doesn't support sharing files (common inside wrapped Android apps).
  // Download the file normally instead — it will appear in the device's Downloads/notification tray,
  // where "Save to Drive" or "Share" can usually still be triggered from the system share sheet there.
  try{
    const blob = new Blob([data], {type:mimeType});
    const url = URL.createObjectURL(blob); const a = document.createElement('a');
    a.href = url; a.download = fileName;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    if(statusEl) statusEl.textContent = 'مشاركة الملفات غير مدعومة في هذا التطبيق، فتم تنزيل الملف بدلاً من ذلك. افتحه من إشعار التنزيلات واختر "مشاركة" ثم Google Drive لرفعه يدويًا.';
  }catch(err){ if(statusEl) statusEl.textContent = 'تعذر تجهيز الملف: '+err.message; }
}

/* ---- إلغاء فاتورة مبيعات/مشتريات ---- */
function openCancelInvoiceModal(){
  let type='sale';
  const modal = document.getElementById('modalRoot');
  const render2 = ()=>`
    <h3 style="margin-bottom:12px;">إلغاء فاتورة مبيعات/مشتريات</h3>
    <div class="radio-pair">
      <div class="rp-opt ${type==='sale'?'green-txt':''}" data-t="sale"><span class="radio-dot ${type==='sale'?'on-green':''}"></span>مبيعات</div>
      <div class="rp-opt ${type==='purchase'?'green-txt':''}" data-t="purchase"><span class="radio-dot ${type==='purchase'?'on-green':''}"></span>مشتريات</div>
    </div>
    <div class="row"><input type="text" id="cancelInvNo" placeholder="رقم الفاتورة"><button class="btn btn-danger" id="cancelInvSearch" style="flex:0 0 auto;">بحث وإلغاء</button></div>
    <div id="cancelInvResult" style="margin-top:12px;font-size:13px;"></div>`;
  modal.innerHTML = `<div class="modal-bg" id="mbg"><div class="modal"><div class="modal-body" id="cancelInvBody">${render2()}</div></div></div>`;
  const bind = ()=>{
    document.getElementById('cancelInvBody').innerHTML = render2();
    document.querySelectorAll('[data-t]').forEach(b=>b.addEventListener('click',()=>{ type=b.dataset.t; bind(); }));
    document.getElementById('cancelInvSearch').addEventListener('click', async ()=>{
      const no = document.getElementById('cancelInvNo').value.trim();
      const box = document.getElementById('cancelInvResult');
      if(type==='sale'){
        const sale = DB.sales.find(s=>String(s.invoice)===no && s.status!=='cancelled');
        if(!sale){ box.textContent='لم يتم العثور على فاتورة مبيعات نشطة بهذا الرقم'; return; }
        if(!confirm(`إلغاء فاتورة المبيعات #${sale.invoice} بقيمة ${money(sale.total)}؟ سيتم إرجاع الأصناف للمخزون.`)) return;
        sale.items.forEach(it=>{ const p=DB.products.find(x=>x.id===it.productId); const v=p&&p.variants.find(x=>x.id===it.variantId); if(v) v.stock+=it.qty; });
        sale.status='cancelled';
        await save('products'); await save('sales');
        box.textContent = `تم إلغاء فاتورة المبيعات #${sale.invoice}`;
      } else {
        const items = DB.purchases.filter(pu=>String(pu.invoice)===no);
        if(items.length===0){ box.textContent='لم يتم العثور على فاتورة توريد بهذا الرقم'; return; }
        if(!confirm(`إلغاء فاتورة التوريد #${no}؟ سيتم خصم الكميات من المخزون.`)) return;
        items.forEach(it=>{ const p=DB.products.find(x=>x.id===it.productId); const v=p&&p.variants.find(x=>x.id===it.variantId); if(v) v.stock=Math.max(0,v.stock-it.qty); });
        DB.purchases = DB.purchases.filter(pu=>String(pu.invoice)!==no);
        await save('products'); await save('purchases');
        box.textContent = `تم إلغاء فاتورة التوريد #${no}`;
      }
    });
  };
  bind();
  document.getElementById('mbg').addEventListener('click',e=>{if(e.target.id==='mbg')closeModal();});
}

/* ---- إلغاء مبلغ - صندوق/مصروفات ---- */
function openCancelCashModal(){
  const modal = document.getElementById('modalRoot');
  const renderList = ()=>{
    const adjustments = (currentShift?.adjustments||[]).map((a,idx)=>({...a, kind:'adjustment', idx}));
    const expensesList = DB.expenses.slice(0,15).map(e=>({...e, kind:'expense'}));
    const combined = [...adjustments, ...expensesList].sort((a,b)=>new Date(b.date)-new Date(a.date));
    if(combined.length===0) return `<div style="color:var(--muted);font-size:13px;">لا توجد حركات صندوق أو مصروفات لإلغائها</div>`;
    return combined.map(item=>{
      if(item.kind==='adjustment') return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px dashed var(--border);font-size:13px;">
        <span>${item.type==='add'?'إضافة للصندوق':'خصم من الصندوق'} — ${money(item.amount)} ${item.note?'· '+item.note:''}</span>
        <button class="btn btn-sm btn-danger" data-canceladj="${item.idx}">إلغاء</button></div>`;
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px dashed var(--border);font-size:13px;">
        <span>مصروف: ${item.category} — ${money(item.amount)}</span>
        <button class="btn btn-sm btn-danger" data-cancelexp="${item.id}">إلغاء</button></div>`;
    }).join('');
  };
  modal.innerHTML = `<div class="modal-bg" id="mbg"><div class="modal"><div class="modal-body">
    <h3 style="margin-bottom:12px;">إلغاء مبلغ - صندوق/مصروفات</h3>
    <div id="cancelCashList">${renderList()}</div>
    <button class="btn btn-block" id="cancelCashClose" style="margin-top:14px;">إغلاق</button>
  </div></div></div>`;
  const bind = ()=>{
    document.querySelectorAll('[data-canceladj]').forEach(b=>b.addEventListener('click', async ()=>{
      if(!confirm('إلغاء هذه الحركة النقدية؟')) return;
      currentShift.adjustments.splice(Number(b.dataset.canceladj),1);
      await save('shifts');
      document.getElementById('cancelCashList').innerHTML = renderList(); bind();
    }));
    document.querySelectorAll('[data-cancelexp]').forEach(b=>b.addEventListener('click', async ()=>{
      if(!confirm('إلغاء هذا المصروف؟')) return;
      DB.expenses = DB.expenses.filter(e=>e.id!==b.dataset.cancelexp);
      await save('expenses');
      document.getElementById('cancelCashList').innerHTML = renderList(); bind();
    }));
  };
  bind();
  document.getElementById('cancelCashClose').addEventListener('click',closeModal);
  document.getElementById('mbg').addEventListener('click',e=>{if(e.target.id==='mbg')closeModal();});
}

function openCancelVoucherModal(){

      <span>${v.kind==='receipt'?'سند قبض من '+v.customerName:'سند صرف إلى '+v.supplierName} — ${money(v.amount)}</span>
      <button class="btn btn-sm btn-danger" data-cancelv="${v.id}" data-kind="${v.kind}">إلغاء</button></div>`).join('');
  };
  modal.innerHTML = `<div class="modal-bg" id="mbg"><div class="modal"><div class="modal-body">
    <h3 style="margin-bottom:12px;">إلغاء سند - قبض/صرف</h3>
    <div id="cancelVList">${renderList()}</div>
    <button class="btn btn-block" id="cancelVClose" style="margin-top:14px;">إغلاق</button>
  </div></div></div>`;
  const bind = ()=>{
    document.querySelectorAll('[data-cancelv]').forEach(b=>b.addEventListener('click', async ()=>{
      if(!confirm('إلغاء هذا السند؟ سيتم عكس أثره على الرصيد.')) return;
      if(b.dataset.kind==='receipt'){
        const v = DB.customerPayments.find(x=>x.id===b.dataset.cancelv);
        const cust = DB.customers.find(c=>c.id===v.customerId);
        if(cust) cust.balance = (cust.balance||0) + v.amount;
        DB.customerPayments = DB.customerPayments.filter(x=>x.id!==v.id);
        await save('customers'); await save('customerPayments');
      } else {
        const v = DB.supplierPayments.find(x=>x.id===b.dataset.cancelv);
        DB.supplierPayments = DB.supplierPayments.filter(x=>x.id!==v.id);
        await save('supplierPayments');
      }
      document.getElementById('cancelVList').innerHTML = renderList(); bind();
    }));
  };
  bind();
  document.getElementById('cancelVClose').addEventListener('click',closeModal);
  document.getElementById('mbg').addEventListener('click',e=>{if(e.target.id==='mbg')closeModal();});
}

/* ---- التحويل بين العملاء والموردين ---- */
function openTransferModal(){
  const modal = document.getElementById('modalRoot');
  modal.innerHTML = `<div class="modal-bg" id="mbg"><div class="modal"><div class="modal-body">
    <h3 style="margin-bottom:12px;">التحويل بين العملاء والموردين</h3>
    <div class="field"><label>من (المصدر)</label><select id="trFrom">
      <optgroup label="عملاء">${DB.customers.map(c=>`<option value="c_${c.id}">${c.name} (ذمم: ${money(c.balance||0)})</option>`).join('')}</optgroup>
      <optgroup label="موردون">${DB.suppliers.map(s=>`<option value="s_${s.id}">${s.name}</option>`).join('')}</optgroup>
    </select></div>
    <div class="field"><label>إلى (الوجهة)</label><select id="trTo">
      <optgroup label="عملاء">${DB.customers.map(c=>`<option value="c_${c.id}">${c.name} (ذمم: ${money(c.balance||0)})</option>`).join('')}</optgroup>
      <optgroup label="موردون">${DB.suppliers.map(s=>`<option value="s_${s.id}">${s.name}</option>`).join('')}</optgroup>
    </select></div>
    <div class="field"><label>المبلغ</label><input type="number" id="trAmount" value="0"></div>
    <div class="field"><label>ملاحظات</label><input type="text" id="trNote" placeholder="اختياري"></div>
    <button class="btn btn-primary btn-block" id="trConfirm">تنفيذ التحويل</button>
  </div></div></div>`;
  document.getElementById('mbg').addEventListener('click',e=>{if(e.target.id==='mbg')closeModal();});
  document.getElementById('trConfirm').addEventListener('click', async ()=>{
    const from = document.getElementById('trFrom').value;
    const to = document.getElementById('trTo').value;
    const amount = Number(document.getElementById('trAmount').value)||0;
    const note = document.getElementById('trNote').value.trim();
    if(amount<=0){ alert('أدخل مبلغًا صحيحًا'); return; }
    if(from===to){ alert('اختر جهتين مختلفتين'); return; }
    const applyDelta = (key, delta)=>{
      const [t,id] = key.split('_');
      if(t==='c'){ const c=DB.customers.find(x=>x.id===id); if(c) c.balance=(c.balance||0)+delta; }
    };
    applyDelta(from, amount); applyDelta(to, -amount);
    DB.transfers.unshift({id:uid('tr'), date:new Date().toISOString(), from, to, amount, note, userId:currentUser.id});
    await save('customers'); await save('transfers');
    alert('تم تنفيذ التحويل بنجاح'); closeModal();
  });
}

function openDamagedProductsModal(){
  const modal = document.getElementById('modalRoot');
  modal.innerHTML = `<div class="modal-bg" id="mbg"><div class="modal"><div class="modal-body">
    <h3 style="margin-bottom:12px;">معالجة المنتجات التالفة</h3>
    <div class="field"><label>المنتج</label><select id="dmProduct">${DB.products.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select></div>
    <div class="field"><label>المقاس/اللون</label><select id="dmVariant"></select></div>
    <div class="field"><label>الكمية التالفة</label><input type="number" id="dmQty" value="1" min="1"></div>
    <div class="field"><label>السبب</label><input type="text" id="dmReason" placeholder="مثال: تلف أثناء التخزين"></div>
    <button class="btn btn-danger btn-block" id="dmConfirm">تسجيل التلف وخصم المخزون</button>
  </div></div></div>`;
  const prodSel = document.getElementById('dmProduct'); const varSel = document.getElementById('dmVariant');
  const fill = ()=>{ const p=DB.products.find(x=>x.id===prodSel.value); varSel.innerHTML = p? p.variants.map(v=>`<option value="${v.id}">${v.size}/${v.color} (مخزون ${v.stock})</option>`).join(''):''; };
  fill(); prodSel.addEventListener('change', fill);
  document.getElementById('mbg').addEventListener('click',e=>{if(e.target.id==='mbg')closeModal();});
  document.getElementById('dmConfirm').addEventListener('click', async ()=>{
    const p = DB.products.find(x=>x.id===prodSel.value); const v = p && p.variants.find(x=>x.id===varSel.value);
    const qty = Number(document.getElementById('dmQty').value)||0;
    const reason = document.getElementById('dmReason').value.trim();
    if(!p||!v||qty<=0){ alert('تأكد من اختيار الصنف والكمية'); return; }
    if(qty>v.stock){ alert('الكمية أكبر من المخزون المتاح'); return; }
    v.stock -= qty;
    DB.damages.unshift({id:uid('dm'), date:new Date().toISOString(), productId:p.id, productName:p.name, variantId:v.id, size:v.size, color:v.color, qty, reason, userId:currentUser.id});
    await save('products'); await save('damages');
    alert('تم تسجيل المنتجات التالفة وخصمها من المخزون'); closeModal();
  });
}

/* البحث عن الطابعات المتوفرة حسب نوع الاتصال المختار */
/* عرض الطابعات المقترنة سابقًا تلقائيًا دون الحاجة لأي ضغطة (يدعمه Chrome فقط لأسباب أمنية في المتصفحات الأخرى) */
async function autoListKnownPrinters(){
  const box = document.getElementById('prFoundList');
  if(!box) return;
  const rows = [];
  // 1) Native bridge (classic Bluetooth paired devices) — added by the Android app, if present.
  //    Most cheap 58/80mm thermal printers use classic Bluetooth (SPP), which the Web Bluetooth
  //    API below CANNOT see at all (it only supports BLE), so this bridge is the reliable path.
  try{
    if(window.AndroidBT && typeof window.AndroidBT.getPairedDevices==='function'){
      const list = JSON.parse(window.AndroidBT.getPairedDevices()||'[]');
      list.forEach(d=>rows.push({icon:'📶', label:d.name||'جهاز بلوتوث مقترن', address:d.address}));
    }
  }catch(e){}
  try{
    if(navigator.bluetooth && navigator.bluetooth.getDevices){
      const known = await navigator.bluetooth.getDevices();
      known.forEach(d=>rows.push({icon:'📶', label:d.name||'جهاز بلوتوث مقترن', address:d.id}));
    }
  }catch(e){}
  try{
    if(navigator.usb && navigator.usb.getDevices){
      const known = await navigator.usb.getDevices();
      known.forEach(d=>rows.push({icon:'🔌', label:d.productName||'جهاز USB مقترن', address:String(d.serialNumber||d.vendorId)}));
    }
  }catch(e){}
  if(rows.length===0){
    box.innerHTML = `<div style="font-size:12px;color:var(--muted);padding:6px 0;">لا توجد طابعات مقترنة سابقًا على هذا الجهاز، اضغط "بحث" لاكتشاف طابعة جديدة.</div>`;
    return;
  }
  renderFoundPrinters(rows);
}
function renderFoundPrinters(rows){
  const box = document.getElementById('prFoundList');
  box.innerHTML = `<div style="font-size:11.5px;color:var(--muted);margin-bottom:6px;">الطابعات المتوفرة:</div>` +
    rows.map((r,i)=>`<div class="sg-item" data-found="${i}" style="cursor:pointer;padding:10px 12px;background:#F3F7FF;border-radius:10px;font-size:13px;font-weight:700;margin-bottom:6px;">${r.icon} ${r.label}</div>`).join('');
  box.querySelectorAll('[data-found]').forEach(el=>el.addEventListener('click',()=>{
    const r = rows[Number(el.dataset.found)];
    document.getElementById('prAddress').value = r.address;
    box.querySelectorAll('.sg-item').forEach(x=>x.style.background='#F3F7FF');
    el.style.background='#E3F7E8';
  }));
}
async function searchForPrinters(ptype){
  const box = document.getElementById('prFoundList');
  box.innerHTML = `<div style="font-size:12.5px;color:var(--muted);padding:8px 0;">جارِ البحث عن طابعات...</div>`;
  const pick = (label,address)=>{ document.getElementById('prAddress').value = address; box.innerHTML = `<div style="font-size:12px;color:var(--green);padding:6px 0;">تم اختيار: ${label}</div>`; };
  try{
    if(ptype==='bluetooth'){
      if(window.AndroidBT && typeof window.AndroidBT.getPairedDevices==='function'){
        const list = JSON.parse(window.AndroidBT.getPairedDevices()||'[]');
        if(list.length){
          renderFoundPrinters(list.map(d=>({icon:'📶', label:d.name||'جهاز بلوتوث مقترن', address:d.address})));
          return;
        }
        box.innerHTML = `<div style="font-size:12.5px;color:var(--red);padding:8px 0;">لا توجد طابعات بلوتوث مقترنة بعد. اقترن بالطابعة أولاً من إعدادات بلوتوث الجهاز، ثم اضغط "بحث" مرة أخرى.</div>`;
      } else if(navigator.bluetooth && navigator.bluetooth.requestDevice){
        const device = await navigator.bluetooth.requestDevice({ acceptAllDevices:true });
        pick(device.name||device.id, device.id);
        autoListKnownPrinters();
      } else {
        box.innerHTML = `<div style="font-size:12.5px;color:var(--red);padding:8px 0;">الجهاز/المتصفح لا يدعم البحث التلقائي عن البلوتوث. تأكد من اقتران الطابعة من إعدادات الجهاز ثم أدخل عنوان MAC يدويًا.</div>`;
      }
    } else if(ptype==='usb'){
      if(navigator.usb && navigator.usb.requestDevice){
        const device = await navigator.usb.requestDevice({ filters:[] });
        const label = device.productName || 'طابعة USB';
        pick(label, String(device.serialNumber||device.vendorId));
        autoListKnownPrinters();
      } else {
        box.innerHTML = `<div style="font-size:12.5px;color:var(--red);padding:8px 0;">المتصفح لا يدعم البحث عن أجهزة USB على هذا الجهاز.</div>`;
      }
    } else if(ptype==='wifi'){
      box.innerHTML = `<div class="field" style="margin-top:6px;"><label>أدخل عنوان IP الخاص بطابعة الشبكة</label><input type="text" id="prWifiIp" placeholder="مثال: 192.168.1.50"></div>
        <button class="btn btn-sm" id="prWifiUse">استخدام هذا العنوان</button>
        <div style="font-size:11.5px;color:var(--muted);margin-top:6px;">لا يمكن للمتصفح مسح الشبكة تلقائيًا لأسباب أمنية، الرجاء إدخال عنوان IP الخاص بالطابعة من إعدادات الطابعة نفسها.</div>`;
      document.getElementById('prWifiUse').addEventListener('click', ()=>{
        const ip = document.getElementById('prWifiIp').value.trim();
        if(ip) pick('طابعة شبكة '+ip, ip);
      });
    } else {
      box.innerHTML = `<div style="font-size:12.5px;color:var(--muted);padding:8px 0;">اختر نوع PDF/A4 لا يتطلب بحث عن جهاز طابعة.</div>`;
    }
  }catch(err){
    box.innerHTML = `<div style="font-size:12.5px;color:var(--red);padding:8px 0;">لم يتم العثور على أي طابعة أو تم إلغاء البحث.</div>`;
  }
}

    <div class="field"><label>رقم الهاتف</label><input type="text" id="as_phone" value="${s.storePhone||''}"></div>
    <div class="row"><div class="field"><label>الرقم الضريبي</label><input type="text" id="as_tax" value="${s.taxNumber||''}"></div><div class="field"><label>رقم السجل التجاري</label><input type="text" id="as_cr" value="${s.crNumber||''}"></div></div>
    <label>شعار المتجر</label>
    <div class="row" style="align-items:center;margin-bottom:14px;">
      <input type="file" id="as_logoFile" accept="image/*" style="flex:2;">
      ${s.logoImage?`<img src="${s.logoImage}" style="width:36px;height:36px;object-fit:cover;border-radius:8px;">`:''}
      ${s.logoImage?`<button class="btn btn-sm btn-danger" id="as_logoClear">✕</button>`:''}
    </div>
    <label>ختم أو توقيع</label>
    <div class="row" style="align-items:center;">
      <input type="file" id="as_stampFile" accept="image/*" style="flex:2;">
      ${s.stampImage?`<img src="${s.stampImage}" style="width:36px;height:36px;object-fit:cover;border-radius:8px;">`:''}
      ${s.stampImage?`<button class="btn btn-sm btn-danger" id="as_stampClear">✕</button>`:''}
    </div>

  <div class="panel">
    <h3 style="margin-top:0;font-size:14px;">العملة واللغة</h3>
    <div class="row"><div class="field"><label>الدولة</label><input type="text" id="as_country" value="${s.country||''}"></div><div class="field"><label>اسم اللغة (للعرض فقط)</label><input type="text" id="as_language" value="${s.language||'العربية'}"></div></div>
    <div class="row"><div class="field"><label>العملة</label><input type="text" id="as_currency" value="${s.currency}"></div><div class="field"><label>الجزء الأصغر من العملة</label><input type="text" id="as_subunit" value="${s.currencySubunit||'هللة'}"></div></div>
    <label>لغة واجهة البرنامج / Interface Language</label>
    <div class="radio-pair" id="uiLangRow" style="margin-bottom:6px;">
      <div class="rp-opt ${s.uiLanguage!=='en'?'green-txt':''}" data-uilang="ar"><span class="radio-dot ${s.uiLanguage!=='en'?'on-green':''}"></span>العربية</div>
      <div class="rp-opt ${s.uiLanguage==='en'?'green-txt':''}" data-uilang="en"><span class="radio-dot ${s.uiLanguage==='en'?'on-green':''}"></span>English</div>
    </div>
    <p style="font-size:11.5px;color:var(--muted);">ملاحظة: تمت ترجمة القوائم الرئيسية والعناوين، وبعض الشاشات التفصيلية ما زالت بالعربية.</p>
  </div>

  <div class="panel">
    <h3 style="margin-top:0;font-size:14px;">خيارات البيع</h3>
    ${toggle('warnLowStock','التحذير حال نقص المخزون')}
    ${toggle('blockSaleWhenOutOfStock','منع البيع في حال نفاذ المخزون')}
    ${toggle('allowDuplicateInCart','السماح بتكرار المنتج كسطر منفصل أثناء البيع')}
    ${toggle('allowCreditSale','السماح بالبيع بالآجل')}
    ${toggle('hidePriceInSale','عدم السماح بعرض السعر')}
    ${toggle('disablePriceEditInSale','عدم السماح بتعديل السعر في المبيعات')}
    ${toggle('showCostInSaleScreen','إظهار سعر التكلفة في شاشة البيع')}
    ${toggle('preventBelowCostSale','عدم السماح بالبيع بأقل من التكلفة')}
    ${toggle('allowEditSaleDate','السماح بتعديل تاريخ البيع')}
    ${toggle('showQtyInSearchList','إظهار الكمية في قائمة البحث بالمبيعات')}
    ${toggle('showOnlyInStockProducts','إظهار المنتجات الباقي لها مخزون فقط')}
    ${toggle('allowQuickSale','السماح بالبيع السريع (بدون نافذة اختيار)')}
    ${toggle('showCurrencyConverterAtPayment','إظهار محوّل العملات أثناء الدفع')}
    ${toggle('showDateInSaleScreen','إظهار التاريخ في شاشة البيع')}
    ${toggle('showInvoiceNumberInSaleScreen','إظهار رقم الفاتورة في شاشة البيع')}

    ${toggle('showHelpMessages','إظهار رسائل المساعدة')}
    <div class="row">
      <div class="field"><label>عدد الأعمدة في عرض المنتجات</label><select id="as_cols"><option value="2" ${s.productListColumns==2?'selected':''}>2</option><option value="3" ${s.productListColumns==3?'selected':''}>3</option><option value="4" ${s.productListColumns==4?'selected':''}>4</option></select></div>
      <div class="field"><label>حجم صورة المنتج</label><select id="as_imgsize"><option value="24" ${s.productImageListSize==24?'selected':''}>صغير</option><option value="32" ${s.productImageListSize==32?'selected':''}>متوسط</option><option value="48" ${s.productImageListSize==48?'selected':''}>كبير</option></select></div>
    </div>
  </div>

  <div class="panel">
    <h3 style="margin-top:0;font-size:14px;">تنبيهات المخزون</h3>
    <div class="field">
      <label>التنبيه عند وصول المخزون إلى</label>
      <div style="display:flex;gap:6px;align-items:center;">
        <input type="number" id="as_lowstock" value="${s.lowStockAlertThreshold||5}" style="flex:1;">

      </div>
    </div>
  </div>


  <div class="panel">
    <h3 style="margin-top:0;font-size:14px;">الأمان والصوت</h3>

    <div class="row"><input type="password" id="as_lockPass" placeholder="${s.lockPassword?'●●●●●● (مفعّلة حاليًا)':'اتركه فارغًا للتعطيل'}"><button class="btn btn-sm" id="as_lockSave" style="flex:0 0 auto;">حفظ</button></div>

  <div class="panel">
    <h3 style="margin-top:0;font-size:14px;">معالجة البيانات</h3>
    <p style="font-size:12px;color:var(--muted);margin-bottom:10px;">حدد البيانات المراد إلغاؤها</p>
    <div id="dpCheckList">
      ${dpCheckRow('dp_sales','المبيعات')}
      ${dpCheckRow('dp_purchases','المشتريات')}
      ${dpCheckRow('dp_customers','العملاء')}
      ${dpCheckRow('dp_suppliers','الموردين')}
      ${dpCheckRow('dp_cash','الصندوق')}
      ${dpCheckRow('dp_expenses','المصروفات')}
      ${dpCheckRow('dp_stockQty','المخزن - تعديل الكميه 0 لجميع المنتجات')}
      ${dpCheckRow('dp_stockPrice','المخزن - تعديل الاسعار 0 لجميع المنتجات')}
      ${dpCheckRow('dp_cancelProducts','المخزن - إلغاء جميع المنتجات')}

    <button class="btn btn-danger btn-block" id="as_clearSelected" style="margin-top:6px;">🗑️ إلغاء البيانات المحددة</button>

    <button class="btn btn-block" id="as_processData">🔧 معالجة البيانات الآن</button>
  </div>

  <div class="panel"><button class="btn btn-primary btn-block" id="as_saveAll">💾 حفظ جميع الإعدادات</button></div>`;

function dpCheckRow(id,label){
  return `<label style="display:flex;align-items:center;gap:10px;padding:11px 2px;border-bottom:1px solid var(--border);font-size:13.5px;font-weight:700;color:var(--red);cursor:pointer;">
    <input type="checkbox" id="${id}" style="width:18px;height:18px;flex-shrink:0;">${label}</label>`;
}
function bindAdvSettings(){
  document.querySelectorAll('[data-tg]').forEach(sw=>sw.addEventListener('click',()=>{
    const k = sw.dataset.tg; DB.settings[k] = !DB.settings[k]; sw.classList.toggle('on', DB.settings[k]);
  }));
  document.querySelectorAll('#uiLangRow .rp-opt').forEach(b=>b.addEventListener('click', async ()=>{
    DB.settings.uiLanguage = b.dataset.uilang;
    await save('settings');
    render();
  }));
  const logoFile = document.getElementById('as_logoFile');
  logoFile.addEventListener('change', ()=>{ const f=logoFile.files[0]; if(!f) return; const r=new FileReader(); r.onload=e=>{ DB.settings.logoImage=e.target.result; save('settings').then(()=>render()); }; r.readAsDataURL(f); });
  const logoClear = document.getElementById('as_logoClear'); if(logoClear) logoClear.addEventListener('click', async ()=>{ DB.settings.logoImage=''; await save('settings'); render(); });
  const stampFile = document.getElementById('as_stampFile');
  stampFile.addEventListener('change', ()=>{ const f=stampFile.files[0]; if(!f) return; const r=new FileReader(); r.onload=e=>{ DB.settings.stampImage=e.target.result; save('settings').then(()=>render()); }; r.readAsDataURL(f); });
  const stampClear = document.getElementById('as_stampClear'); if(stampClear) stampClear.addEventListener('click', async ()=>{ DB.settings.stampImage=''; await save('settings'); render(); });

  const lowstockApplyAll = document.getElementById('as_lowstockApplyAll');
  if(lowstockApplyAll) lowstockApplyAll.addEventListener('click', async ()=>{
    const val = Number(document.getElementById('as_lowstock').value)||5;
    if(!confirm(`سيتم تطبيق حد التنبيه (${val}) على كل مقاسات/ألوان كل المنتجات. متابعة؟`)) return;
    let count = 0;
    DB.products.forEach(p=>p.variants.forEach(v=>{ v.reorderLevel = val; count++; }));
    DB.settings.lowStockAlertThreshold = val;
    await save('products'); await save('settings');
    alert(`تم تطبيق الحد (${val}) على ${count} صنف/متغير.`);
    render();
  });
  document.getElementById('as_lockSave').addEventListener('click', async ()=>{
    const pass = document.getElementById('as_lockPass').value;
    DB.settings.lockPassword = pass; await save('settings');
    alert(pass? 'تم تفعيل قفل كلمة السر':'تم تعطيل قفل كلمة السر');
    render();
  });
  document.getElementById('as_processData').addEventListener('click', async ()=>{
    let fixed=0;
    DB.customers.forEach(c=>{ if((c.balance||0)<0){ c.balance=0; fixed++; } if((c.points||0)<0){ c.points=0; fixed++; } });
    DB.products.forEach(p=>p.variants.forEach(v=>{ if(v.stock<0){ v.stock=0; fixed++; } }));
    await save('customers'); await save('products');
    alert(`تمت معالجة البيانات. تم تصحيح ${fixed} قيمة غير سليمة.`);
  });
  document.getElementById('as_clearSelected').addEventListener('click', async ()=>{
    const sel = {
      sales: document.getElementById('dp_sales').checked,
      purchases: document.getElementById('dp_purchases').checked,
      customers: document.getElementById('dp_customers').checked,
      suppliers: document.getElementById('dp_suppliers').checked,
      cash: document.getElementById('dp_cash').checked,
      expenses: document.getElementById('dp_expenses').checked,
      stockQty: document.getElementById('dp_stockQty').checked,
      stockPrice: document.getElementById('dp_stockPrice').checked,
      cancelProducts: document.getElementById('dp_cancelProducts').checked
    };
    const chosenLabels = [];
    if(sel.sales) chosenLabels.push('المبيعات');
    if(sel.purchases) chosenLabels.push('المشتريات');
    if(sel.customers) chosenLabels.push('العملاء');
    if(sel.suppliers) chosenLabels.push('الموردين');
    if(sel.cash) chosenLabels.push('الصندوق');
    if(sel.expenses) chosenLabels.push('المصروفات');
    if(sel.stockQty) chosenLabels.push('تعديل كميات المخزون إلى 0');
    if(sel.stockPrice) chosenLabels.push('تعديل أسعار المنتجات إلى 0');
    if(sel.cancelProducts) chosenLabels.push('إلغاء جميع المنتجات');
    if(chosenLabels.length===0){ alert('لم تحدد أي بيانات لإلغائها'); return; }
    if(!confirm(`سيتم إلغاء البيانات التالية نهائيًا ولا يمكن التراجع عنها:\n\n${chosenLabels.join('، ')}\n\nهل أنت متأكد؟`)) return;
    if(sel.sales){ DB.sales = []; await save('sales'); }
    if(sel.purchases){ DB.purchases = []; await save('purchases'); }
    if(sel.customers){
      DB.customers = DB.customers.filter(c=>c.walkIn);
      DB.customers.forEach(c=>{ c.balance=0; c.points=0; });
      await save('customers');
    }
    if(sel.suppliers){ DB.suppliers = []; await save('suppliers'); }
    if(sel.cash){
      DB.shifts = currentShift ? [currentShift] : [];
      if(currentShift) currentShift.adjustments = [];
      await save('shifts');
    }
    if(sel.expenses){ DB.expenses = []; await save('expenses'); }
    if(sel.stockQty){ DB.products.forEach(p=>p.variants.forEach(v=>{ v.stock = 0; })); await save('products'); }
    if(sel.stockPrice){ DB.products.forEach(p=>{ p.price=0; p.price2=0; p.price3=0; }); await save('products'); }
    if(sel.cancelProducts){ DB.products = []; await save('products'); }
    alert('تم إلغاء البيانات المحددة بنجاح');
    render();
  });
  document.getElementById('as_saveAll').addEventListener('click', async ()=>{
    DB.settings.storeName = document.getElementById('as_storeName').value.trim()||DB.settings.storeName;
    DB.settings.storeAddress = document.getElementById('as_address').value.trim();
    DB.settings.storePhone = document.getElementById('as_phone').value.trim();
    DB.settings.taxNumber = document.getElementById('as_tax').value.trim();
    DB.settings.crNumber = document.getElementById('as_cr').value.trim();
    DB.settings.country = document.getElementById('as_country').value.trim();
    DB.settings.language = document.getElementById('as_language').value.trim()||'العربية';
    DB.settings.currency = document.getElementById('as_currency').value.trim()||DB.settings.currency;
    DB.settings.currencySubunit = document.getElementById('as_subunit').value.trim()||'هللة';
    DB.settings.productListColumns = Number(document.getElementById('as_cols').value)||2;
    DB.settings.productImageListSize = Number(document.getElementById('as_imgsize').value)||32;
    DB.settings.lowStockAlertThreshold = Number(document.getElementById('as_lowstock').value)||5;
    await save('settings');
    alert('تم حفظ جميع الإعدادات بنجاح');
    render();
  });
}
function playBeep(){
  if(DB.settings.muteSounds) return;
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880; gain.gain.value = 0.08;
    osc.start(); osc.stop(ctx.currentTime+0.09);
  }catch(e){}
}

window.addEventListener('error', e=>{
  console.error('Unhandled error:', e.error||e.message);
  const gateEl = document.getElementById('gate');

    gateEl.innerHTML = `<div class="gate-wrap"><div class="gate-card" style="text-align:center;">
      <div style="font-size:30px;margin-bottom:10px;">⚠️</div>

      <button class="btn btn-primary btn-block" onclick="location.reload()">تحديث الصفحة</button>
    </div></div>`;
  }
});
window.addEventListener('unhandledrejection', e=>{ console.error('Unhandled promise rejection:', e.reason); });

/* ---------- Global USB/HID barcode-scanner capture ----------
   A USB barcode scanner behaves exactly like a keyboard: it fires a very fast
   burst of keydown events (one per character) followed by Enter, with no real
   user intent behind any individual key. If that burst lands while no text
   field is focused, stray keys — especially Backspace/Escape — can trigger the
   browser/WebView's default "navigate back" action and kick the user out of
   the current screen entirely. This listener buffers fast keystrokes globally
   and, whenever they were NOT typed into an actual input/textarea, blocks
   their default action so they can never cause the page to exit, then routes
   the finished barcode into the cart once Enter arrives. */
(function setupGlobalScannerCapture(){
  let buffer = '';
  let lastTime = 0;
  const isEditable = el => !!el && (el.tagName==='INPUT' || el.tagName==='TEXTAREA' || el.isContentEditable);
  document.addEventListener('keydown', e=>{
    const active = document.activeElement;
    if(isEditable(active)){ buffer=''; return; } // a real field has focus — let normal typing/scanning-into-field work as-is
    const now = Date.now();
    const gap = now - lastTime;
    lastTime = now;
    if(e.key==='Enter'){
      if(buffer.trim()){
        e.preventDefault();
        const code = buffer.trim(); buffer='';
        if(typeof addToCartBySku==='function'){
          try{ addToCartBySku(code, typeof qtyMultiplier!=='undefined'?qtyMultiplier:1); }catch(err){ console.error('scanner add-to-cart failed', err); }
        }
      }
      return;
    }
    if(e.key.length===1){
      if(gap>500) buffer=''; // too slow to be a scanner burst — a stray unfocused keystroke, not a scan
      buffer += e.key;
      e.preventDefault();
    } else if(e.key==='Backspace' || e.key==='Escape'){
      // never let these fall through to a native/browser "back" action while nothing is focused
      e.preventDefault();
      buffer='';
    }
  }, true);
})();

(async function init(){
  document.getElementById('gate').innerHTML = `<div class="gate-wrap"><div class="gate-card" style="text-align:center;padding:50px 30px;">جارٍ التحميل...</div></div>`;
  try{
    await loadAll();
    applyLangDir();
    showGate();
  }catch(e){
    console.error('init failed', e);
    document.getElementById('gate').innerHTML = `<div class="gate-wrap"><div class="gate-card" style="text-align:center;">
      <div style="font-size:30px;margin-bottom:10px;">⚠️</div>
      <h2>تعذر تحميل البيانات</h2>
      <div class="gsub">حدث خطأ أثناء التحميل الأولي.</div>
      <button class="btn btn-primary btn-block" onclick="location.reload()">إعادة المحاولة</button>
    </div></div>`;
  }
})();
</script>
